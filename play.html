<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperFan Shuffle">
<meta name="theme-color" content="#2a1257">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>SuperFan Shuffle — Tilt Test</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
 :root{--purple:#2a1257;--cyan:#57e6ff;--mag:#ff5cf0;--green:#20e468;--orange:#ff9d2e;--disp:'Bebas Neue','Arial Narrow',sans-serif;--body:'Barlow',system-ui,sans-serif;}
 *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
 html,body{height:100%;overflow:hidden;font-family:var(--body);background:#000;color:#eafcff;user-select:none;-webkit-user-select:none}
 #app{position:fixed;inset:16px;border-radius:40px;overflow:hidden;border:8px solid rgba(255,255,255,.94);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;background-color:var(--purple);background-image:radial-gradient(130% 95% at 50% 18%,rgba(255,255,255,.10) 0%,rgba(255,255,255,0) 42%,rgba(0,0,0,.34) 100%),repeating-linear-gradient(45deg,rgba(255,255,255,.045) 0 1px,transparent 1px 6px),repeating-linear-gradient(-45deg,rgba(0,0,0,.05) 0 1px,transparent 1px 6px);box-shadow:0 0 28px rgba(87,230,255,.5),inset 0 0 26px rgba(87,230,255,.3);transition:background-color .14s,box-shadow .14s,border-color .14s}
 #app.st-correct{background-color:var(--green);border-color:#fff;box-shadow:0 0 48px rgba(255,255,255,.7),inset 0 0 72px rgba(255,255,255,.5)}
 #app.st-pass{background-color:var(--orange);box-shadow:0 0 26px rgba(255,255,255,.35),inset 0 0 42px rgba(255,255,255,.28)}
 #app.st-timeup{background-color:#e01e4a;box-shadow:0 0 28px rgba(255,0,80,.5),inset 0 0 42px rgba(255,0,80,.4)}
 @media (orientation:portrait){ body.lock-ls #app{ inset:auto; top:100%; left:0; width:100vh; height:100vw; transform-origin:left top; transform:rotate(-90deg); } }
 .screen{display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;width:100%;height:100%}
 .screen.on{display:flex}
 h1{font-family:var(--disp);font-size:17vmin;letter-spacing:2px;line-height:.86;text-transform:uppercase}
 .l1{color:var(--cyan);text-shadow:0 0 16px rgba(87,230,255,.85)}
 .l2{color:var(--mag);text-shadow:0 0 16px rgba(255,92,240,.85)}
 .sub{font-size:5vw;color:var(--sand);max-width:640px;line-height:1.4}
 .btn{font-family:var(--disp);font-size:8vw;padding:14px 44px;border:3px solid var(--cyan);border-radius:44px;background:rgba(87,230,255,.10);color:#fff;letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 0 18px rgba(87,230,255,.6),inset 0 0 16px rgba(87,230,255,.22);text-shadow:0 0 10px rgba(87,230,255,.7)}
 .btn:active{transform:translateY(3px);box-shadow:0 1px 0 #000}
 .small{font-size:4vw;color:var(--sand);opacity:.85}
 /* GAME */
 #card{font-family:var(--disp);font-size:18vmin;color:#eafcff;text-transform:uppercase;letter-spacing:2px;text-shadow:0 0 14px rgba(87,230,255,.55),2px 3px 0 rgba(0,0,0,.45);line-height:.98;padding:0 14px;max-width:96vw}
 #big{font-family:var(--disp);font-size:34vmin;color:#fff;line-height:1;text-shadow:0 0 22px rgba(87,230,255,.6),3px 4px 0 rgba(0,0,0,.4)}
 #timer{font-family:var(--disp);font-size:11vmin;color:#eafcff;letter-spacing:2px;text-shadow:0 0 10px rgba(87,230,255,.5),2px 2px 0 rgba(0,0,0,.4)}
 #score{position:fixed;top:14px;right:20px;font-family:var(--disp);font-size:8vmin;color:var(--cyan);letter-spacing:1px;text-shadow:0 0 10px rgba(87,230,255,.6)}
 #hint{position:fixed;bottom:12px;left:0;right:0;font-size:3.4vmin;color:rgba(255,255,255,.8);letter-spacing:.5px}
 /* debug */
 #dbg{position:fixed;bottom:6px;left:6px;font:12px/1.4 monospace;color:#0f0;background:rgba(0,0,0,.55);padding:6px 8px;border-radius:6px;display:none;text-align:left;z-index:9}
 #dbgBtn{position:fixed;top:8px;left:8px;font:11px monospace;color:#aaa;background:rgba(0,0,0,.4);border:1px solid #555;border-radius:6px;padding:4px 7px;z-index:10}
 .rotate{font-size:5vw;color:var(--gold)}
 ul{list-style:none;text-align:left;max-width:90vw;max-height:46vh;overflow:auto;font-size:4.4vw}
 li{padding:3px 0;border-bottom:1px solid rgba(255,255,255,.12)}
 li.g{color:#7fe0a0}li.p{color:#e6c65a}
 /* READY flow */
 #rotateMsg{display:flex;align-items:center;justify-content:center;height:100%}
 .fhText{transform:rotate(-90deg);white-space:nowrap;font-family:var(--disp);font-size:15vmin;color:var(--cyan);text-transform:uppercase;letter-spacing:2px;line-height:1.15;text-shadow:0 0 16px rgba(87,230,255,.7),2px 2px 0 rgba(0,0,0,.4)}
 .fhHint{display:block;font-size:3.4vw;color:var(--sand);opacity:.9;letter-spacing:0;text-transform:none;margin-top:6px}
 #getReady{display:none;font-family:var(--disp);font-size:14vmin;color:var(--mag);text-transform:uppercase;letter-spacing:2px;line-height:.92;max-width:94vw;text-shadow:0 0 20px rgba(255,92,240,.75),2px 3px 0 rgba(0,0,0,.4)}
 @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
 @keyframes pop{0%{transform:scale(.35);opacity:0}45%{transform:scale(1.22);opacity:1}100%{transform:scale(1);opacity:1}}
 @keyframes cardIn{0%{transform:scale(.22);opacity:0}60%{transform:scale(1.08);opacity:1}100%{transform:scale(1);opacity:1}}
 .pulsing{animation:pulse .7s ease-in-out infinite}
 .pop{animation:pop .5s cubic-bezier(.2,1.5,.4,1)}
 .zoomIn{animation:cardIn .5s cubic-bezier(.2,1.25,.4,1)}
 @keyframes flyIn{0%{transform:translateX(66%) scale(.9);opacity:0}55%{transform:translateX(-7%) scale(1.05);opacity:1}78%{transform:translateX(3%) scale(.99)}100%{transform:translateX(0) scale(1);opacity:1}}
 .flyIn{animation:flyIn .55s cubic-bezier(.25,1.25,.4,1)}
 @keyframes heroPop{0%{transform:scale(.35);opacity:0}45%{transform:scale(1.34);opacity:1}72%{transform:scale(.95)}100%{transform:scale(1)}}
 .heroPop{animation:heroPop .62s cubic-bezier(.2,1.5,.35,1)}
</style></head>
<body>
<button id="dbgBtn">debug</button>
<div id="dbg"></div>
<div id="app">
  <!-- START -->
  <div class="screen on" id="sStart">
    <h1><span class="l1">SuperFan</span><br><span class="l2">Shuffle</span></h1>
    <div class="sub">Hold the phone to your forehead.<br><b>Tilt DOWN</b> when you get it • <b>Tilt UP</b> to pass.</div>
    <button class="btn" id="startBtn">Tap to Play</button>
    <div class="small">Tilt test build · turn sideways to play</div>
  </div>
  <!-- READY (countdown) -->
  <div class="screen" id="sReady">
    <div id="rotateMsg"><div class="fhText">Place on your forehead<span class="fhHint">↻ turn phone sideways</span></div></div>
    <div id="getReady">Time to Face the Music</div>
    <div id="big">3</div>
  </div>
  <!-- GAME -->
  <div class="screen" id="sGame">
    <div id="score">0</div>
    <div id="card">—</div>
    <div id="timer">1:00</div>
  </div>
  <!-- END -->
  <div class="screen" id="sEnd">
    <h1 style="font-size:9vw">Time!</h1>
    <div class="sub">You got <b id="finalScore">0</b></div>
    <ul id="recap"></ul>
    <button class="btn" id="againBtn">Play Again</button>
  </div>
</div>
<script>
/* ---------- sample deck (placeholder — content TBD) ---------- */
var DECK=["Bohemian Rhapsody","Sweet Child O' Mine","Billie Jean","Don't Stop Believin'","Wonderwall","Smells Like Teen Spirit","Poker Face","Mr. Brightside","Hotel California","Rolling in the Deep","Under Pressure","Africa","Take On Me","Uptown Funk","Purple Rain","Livin' on a Prayer","Bad Guy","Shake It Off","Hey Jude","Seven Nation Army","Stairway to Heaven","Dancing Queen","Wannabe","Zombie","Creep","Toxic","Umbrella","Blinding Lights","Hips Don't Lie","Yeah!"];
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

/* ---------- screens ---------- */
var app=document.getElementById('app');
function show(id){['sStart','sReady','sGame','sEnd'].forEach(function(s){document.getElementById(s).classList.toggle('on',s===id);});}

/* ---------- tilt engine (gravity z-axis = screen facing down/up, orientation-agnostic) ---------- */
var TH=7.4, NEUTRAL=3.2;         // trigger + re-arm thresholds (tune via debug)
var HOLD_MS=110, COOLDOWN_MS=450;// must hold past TH this long; lockout after each mark
var armed=true, gz=0, beta=0, gamma=0, haveMotion=false;
var holdDir=0, holdStart=0, lastMark=0;
var IS_IOS=/iP(hone|ad|od)/.test(navigator.userAgent)&&!window.MSStream;
var DOWN_IS_GOOD=IS_IOS?1:-1;    // Android z-sign=-1; iOS likely +1. If reversed on a device, flip that device's value.
function nowMs(){ return (window.performance&&performance.now)?performance.now():Date.now(); }
function evalTilt(){
  if(!playing) return;
  var now=nowMs();
  if(!armed){ if(Math.abs(gz)<NEUTRAL && now-lastMark>COOLDOWN_MS){ armed=true; } holdDir=0; return; }
  if(now-lastMark < COOLDOWN_MS){ return; }
  var v=gz*DOWN_IS_GOOD;
  var dir=(v>TH)?1:((v<-TH)?-1:0);
  if(dir===0){ holdDir=0; return; }
  if(dir!==holdDir){ holdDir=dir; holdStart=now; return; }   // just crossed: start hold timer
  if(now-holdStart >= HOLD_MS){ armed=false; lastMark=now; holdDir=0; mark(dir>0); }  // held long enough
}
function onMotion(e){
  var g=e.accelerationIncludingGravity; if(!g||g.z==null) return; haveMotion=true;
  gz=g.z; evalTilt(); dbgTick();
}
function onOrient(e){ beta=e.beta||0; gamma=e.gamma||0; if(!haveMotion){ /* fallback: no devicemotion */ gz=(beta/90)*9.8; evalTilt(); } if(awaitingLandscape) checkOrientation(); dbgTick(); }

function attach(){ window.addEventListener('devicemotion',onMotion); window.addEventListener('deviceorientation',onOrient); }
function requestPerm(cb){
  var need=(typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function');
  if(need){ DeviceMotionEvent.requestPermission().then(function(r){ if(typeof DeviceOrientationEvent!=='undefined'&&DeviceOrientationEvent.requestPermission){DeviceOrientationEvent.requestPermission().catch(function(){});} attach(); cb(r==='granted'); }).catch(function(){ attach(); cb(false); }); }
  else { attach(); cb(true); }
}

/* ---------- sound (Web Audio, no files) — distinct per event ---------- */
var AC=null;
function initAudio(){ try{ AC=AC||new (window.AudioContext||window.webkitAudioContext)(); if(AC.state==='suspended') AC.resume(); }catch(e){} }
function tone(freq,dur,type,vol,when){ if(!AC) return; var t0=AC.currentTime+(when||0); var o=AC.createOscillator(),g=AC.createGain(); o.type=type||'sine'; o.frequency.value=freq; g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol||0.3,t0+0.008); g.gain.exponentialRampToValueAtTime(0.0001,t0+dur); o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+dur+0.04); }
function sndBell(){ initAudio(); if(!AC) return; var t0=AC.currentTime; [[784,0.95,0.34],[1568,0.75,0.16],[2352,0.55,0.07]].forEach(function(p){ var o=AC.createOscillator(),g=AC.createGain(); o.type='sine'; o.frequency.value=p[0]; g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(p[2],t0+0.004); g.gain.exponentialRampToValueAtTime(0.0001,t0+p[1]); o.connect(g); g.connect(AC.destination); o.start(t0); o.stop(t0+p[1]+0.05); }); }
function sndPass(){ initAudio(); tone(240,0.14,'sawtooth',0.28,0); tone(150,0.26,'sawtooth',0.28,0.08); }
function sndBeep(){ initAudio(); tone(600,0.10,'square',0.26,0); }
function sndFanfare(){ initAudio(); [523,659,784,1047].forEach(function(fr,i){ tone(fr,0.20,'triangle',0.26,i*0.10); }); }
function sndClock(hi){ initAudio(); tone(hi?1500:1040,0.04,'square',0.30,0); }
function sndGo(){ initAudio(); tone(700,0.10,'square',0.3,0); tone(1050,0.16,'square',0.3,0.09); }
function sndBuzzer(){ initAudio(); tone(160,0.6,'sawtooth',0.36,0); tone(168,0.6,'square',0.18,0); }

/* ---------- game loop ---------- */
function fmt(t){ var m=Math.floor(t/60), sec=t%60; return m+':'+(sec<10?'0':'')+sec; }
var playing=false, idx=0, order=[], results=[], score=0, timeLeft=60, tHandle=null;
function newCard(){ if(idx>=order.length){ order=shuffle(DECK.slice()); idx=0; } var w=order[idx++]; document.getElementById('card').textContent=w; return w; }
var current='';
function mark(good){
  results.push({w:current,good:good});
  if(good){ score++; document.getElementById('score').textContent=score; }
  flash(good, good?'CORRECT':'PASS');
  good?sndBell():sndPass();
  navigator.vibrate&&navigator.vibrate(good?60:30);
}
function flash(good,label){
  app.classList.remove('st-correct','st-pass'); app.classList.add(good?'st-correct':'st-pass');
  var cd=document.getElementById('card'); cd.textContent=label; cd.classList.remove('zoomIn','flyIn','heroPop');
  setTimeout(function(){ if(playing){ app.classList.remove('st-correct','st-pass'); current=newCard(); cd.classList.remove('zoomIn','flyIn','heroPop'); app.classList.remove('flyIn'); void app.offsetWidth; app.classList.add('flyIn'); } }, good?620:550);
}
function startGame(){
  order=shuffle(DECK.slice()); idx=0; results=[]; score=0; timeLeft=60; armed=true; playing=true;
  document.getElementById('score').textContent='0';
  show('sGame'); app.classList.remove('st-correct','st-pass'); sndGo();
  var tEl0=document.getElementById('timer'); tEl0.classList.remove('pulsing'); tEl0.textContent=fmt(timeLeft);
  document.body.classList.add('lock-ls'); tryLockLandscape();
  current=newCard();
  var cd=document.getElementById('card'); cd.classList.remove('zoomIn','flyIn','heroPop'); app.classList.remove('flyIn'); void app.offsetWidth; app.classList.add('flyIn');
  tHandle=setInterval(function(){
    timeLeft--;
    var tEl=document.getElementById('timer'); tEl.textContent=fmt(timeLeft);
    if(timeLeft<=10 && timeLeft>0){ tEl.classList.add('pulsing'); sndClock(timeLeft%2===0); }
    if(timeLeft<=0){ endGame(); }
  }, 1000);
}
function endGame(){
  playing=false; clearInterval(tHandle);
  var tEl=document.getElementById('timer'); tEl.classList.remove('pulsing'); tEl.textContent='0:00';
  sndBuzzer();
  app.classList.remove('st-correct','st-pass'); app.classList.add('st-timeup');
  var cd=document.getElementById('card'); cd.textContent="TIME'S UP"; cd.classList.remove('zoomIn','flyIn','heroPop'); app.classList.remove('flyIn'); void app.offsetWidth; app.classList.add('flyIn');
  navigator.vibrate&&navigator.vibrate([130,70,130]);
  setTimeout(function(){ app.classList.remove('st-timeup'); document.body.classList.remove('lock-ls'); tryUnlock(); buildRecap(); show('sEnd'); }, 1800);
}
function buildRecap(){
  document.getElementById('finalScore').textContent=score;
  var ul=document.getElementById('recap'); ul.innerHTML='';
  results.forEach(function(r){ var li=document.createElement('li'); li.className=r.good?'g':'p'; li.textContent=(r.good?'\u2713 ':'\u2717 ')+r.w; ul.appendChild(li); });
}
function tryLockLandscape(){ try{ if(screen.orientation&&screen.orientation.lock){ screen.orientation.lock('landscape').catch(function(){}); } }catch(e){} }
function tryUnlock(){ try{ if(screen.orientation&&screen.orientation.unlock){ screen.orientation.unlock(); } }catch(e){} }

/* ---------- ready: wait for portrait -> landscape, then 3-2-1 ---------- */
var awaitingLandscape=false, counting=false;
function isLandscape(){
  var mm=(window.matchMedia && window.matchMedia('(orientation: landscape)').matches);
  return !!mm || Math.abs(gamma) > 55;
}
function ready(){
  show('sReady'); counting=false; awaitingLandscape=true;
  document.getElementById('rotateMsg').style.display='';
  var gr=document.getElementById('getReady'); gr.style.display='none'; gr.classList.remove('pulsing');
  document.getElementById('big').style.display='none';
  checkOrientation();
}
function checkOrientation(){ if(awaitingLandscape && isLandscape()){ awaitingLandscape=false; startCountdown(); } }
function popEl(el){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); }
function startCountdown(){
  if(counting) return; counting=true;
  document.getElementById('rotateMsg').style.display='none';
  var gr=document.getElementById('getReady'), big=document.getElementById('big');
  big.style.display='none';
  gr.style.display='block'; gr.classList.add('pulsing');
  sndFanfare();
  navigator.vibrate&&navigator.vibrate(50);
  setTimeout(function(){
    gr.classList.remove('pulsing'); gr.style.display='none';
    big.style.display=''; var n=3; big.textContent=n; popEl(big); sndBeep(); navigator.vibrate&&navigator.vibrate(40);
    var iv=setInterval(function(){
      n--;
      if(n<=0){ clearInterval(iv); startGame(); }
      else { big.textContent=n; popEl(big); sndBeep(); navigator.vibrate&&navigator.vibrate(40); }
    }, 850);
  }, 1300);
}
window.addEventListener('orientationchange', function(){ setTimeout(checkOrientation,150); });
window.addEventListener('resize', checkOrientation);

/* ---------- buttons ---------- */
function goFullscreen(){ try{ var el=document.documentElement; var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen; if(fn && !(document.fullscreenElement||document.webkitFullscreenElement)){ var p=fn.call(el); if(p&&p.catch)p.catch(function(){}); } }catch(e){} }
document.getElementById('startBtn').onclick=function(){ goFullscreen(); initAudio(); requestPerm(function(ok){ ready(); }); };
document.getElementById('againBtn').onclick=function(){ goFullscreen(); initAudio(); ready(); };

/* ---------- debug ---------- */
var dbgOn=false;
document.getElementById('dbgBtn').onclick=function(){ dbgOn=!dbgOn; document.getElementById('dbg').style.display=dbgOn?'block':'none'; };
function dbgTick(){ if(!dbgOn) return; document.getElementById('dbg').innerHTML='gz: '+gz.toFixed(2)+'<br>beta: '+beta.toFixed(0)+'  gamma: '+gamma.toFixed(0)+'<br>armed: '+armed+'  hold:'+holdDir+'  motion:'+haveMotion+'<br>TH:'+TH+' NEU:'+NEUTRAL; }
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body></html>

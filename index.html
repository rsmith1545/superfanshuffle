<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperFan Shuffle">
<meta name="theme-color" content="#2a1257">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>SuperFan Shuffle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cyan:#57e6ff;--mag:#ff5cf0;--bg0:#160b2e;--bg1:#2a1257;--card:#20143f;--ink:#f3eaff;--dim:#b9a8e0;--free:#25d07a;--prem:#ffd24a;--disp:'Bebas Neue',sans-serif;--body:'Barlow',system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:var(--body);color:var(--ink);
 background:radial-gradient(120% 80% at 50% -10%,#3a1a6e 0%,var(--bg1) 42%,var(--bg0) 100%);background-attachment:fixed;-webkit-user-select:none;user-select:none}
body{overflow-y:auto;padding:0 0 40px}
.wrap{max-width:820px;margin:0 auto;padding:0 16px}
/* header / logo */
header{padding:22px 16px 10px;text-align:center}
.logo{display:inline-block;border:3px solid var(--mag);border-radius:22px;padding:10px 22px 14px;
 box-shadow:0 0 18px rgba(255,92,240,.55),inset 0 0 18px rgba(255,92,240,.25)}
.logo b{display:block;font-family:var(--disp);letter-spacing:1px;line-height:.82;font-size:15vw;max-width:100%;transform:skewX(-6deg)}
.logo .l1{color:#bfefff;text-shadow:0 0 10px var(--cyan),0 0 22px rgba(87,230,255,.7)}
.logo .l2{color:#ffc4f6;text-shadow:0 0 10px var(--mag),0 0 22px rgba(255,92,240,.7)}
.tag{margin-top:9px;font-weight:600;font-size:3.7vw;color:var(--cyan);letter-spacing:.5px;text-shadow:0 0 8px rgba(87,230,255,.5)}
@media(min-width:560px){.logo b{font-size:82px}.tag{font-size:18px}}
/* section */
h2{font-family:var(--disp);font-size:24px;letter-spacing:1px;margin:22px 4px 8px;text-transform:uppercase;color:#fff}
h2 .pill{font-style:normal;font-size:11px;vertical-align:middle;margin-left:8px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.12);color:var(--dim)}
.row{display:flex;gap:13px;overflow-x:auto;padding:4px 4px 12px;scroll-snap-type:x mandatory}
.row::-webkit-scrollbar{display:none}
/* vault card */
.vault{flex:0 0 auto;width:150px;scroll-snap-align:start;cursor:pointer;transition:transform .12s}
.vault:active{transform:scale(.96)}
.cover{position:relative;height:150px;border-radius:14px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;text-align:center}
.vinyl{position:absolute;right:-42px;top:50%;transform:translateY(-50%);width:120px;height:120px;border-radius:50%;
 background:radial-gradient(circle at 50% 50%,#111 20%,#000 21%,#1a1a1a 22% 34%,#000 35% 37%,#222 38% 60%,#000 61%);box-shadow:0 0 0 2px rgba(255,255,255,.06)}
.vinyl:after{content:"";position:absolute;inset:44px;border-radius:50%;background:var(--mag);opacity:.9}
.cover .art{position:relative;z-index:2;font-weight:900;font-size:19px;line-height:1.02;padding:0 10px;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.badge{position:absolute;top:8px;left:8px;z-index:3;font-size:9px;font-weight:800;letter-spacing:.5px;padding:3px 7px;border-radius:20px;text-transform:uppercase}
.badge.free{background:var(--free);color:#04240f}.badge.prem{background:var(--prem);color:#3a2a00}
.trial{position:absolute;bottom:8px;right:8px;z-index:3;font-size:9px;font-weight:700;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:20px;color:#fff}
.vname{margin:8px 2px 2px;font-weight:800;font-size:13px;line-height:1.05}
.vvol{font-size:10px;color:var(--dim);font-weight:700;letter-spacing:.5px}
.prog{margin-top:6px;height:5px;border-radius:5px;background:rgba(255,255,255,.12);overflow:hidden}
.prog i{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--mag))}
.pgt{font-size:9px;color:var(--dim);margin-top:3px}
/* featured big */
.feat{display:flex;gap:14px;background:linear-gradient(120deg,rgba(255,92,240,.14),rgba(87,230,255,.10));border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px}
.feat .cover{height:120px;width:120px;flex:0 0 auto}
.feat .fmeta{display:flex;flex-direction:column;justify-content:center;gap:4px}
.feat .fmeta .k{font-family:var(--disp);font-size:30px;letter-spacing:.5px}
.feat .fmeta .s{color:var(--dim);font-size:12px;font-weight:600}
.feat .cta{margin-top:8px;align-self:flex-start;background:linear-gradient(90deg,var(--cyan),var(--mag));color:#12002a;font-weight:900;border:none;border-radius:22px;padding:9px 18px;font-size:13px;cursor:pointer}
/* overlay mode picker */
.ov{position:fixed;inset:0;z-index:50;background:rgba(8,4,20,.72);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,#241645,#180d33);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid rgba(255,255,255,.12);padding:16px 16px 22px;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.shead{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.shead .cover{height:64px;width:64px;flex:0 0 auto}
.shead .t b{font-weight:900;font-size:19px;display:block}
.shead .t span{color:var(--dim);font-size:12px;font-weight:700}
.xbtn{margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
.pk{font-size:12px;color:var(--dim);margin:12px 2px 8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.game{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid transparent;border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer;transition:border-color .12s,background .12s}
.game.sel{border-color:var(--cyan);background:#2b1a54}
.game .ico{font-size:26px;width:40px;text-align:center}
.game .gt{flex:1}
.game .gt b{font-weight:800;font-size:14px;display:block}
.game .gt span{font-size:11px;color:var(--dim);line-height:1.25;display:block;margin-top:2px}
.game .free{font-size:10px;font-weight:800;color:var(--free);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.chk{width:24px;height:24px;border-radius:7px;border:2px solid var(--dim);flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:15px;color:#12002a;font-weight:900}
.game.sel .chk{background:var(--cyan);border-color:var(--cyan)}
.buybar{position:sticky;bottom:0;margin-top:6px;background:linear-gradient(180deg,rgba(24,13,51,0),#180d33 30%);padding-top:14px}
.buybar .tiers{display:flex;justify-content:center;gap:14px;font-size:10.5px;color:var(--dim);margin-bottom:9px}
.buybar .tiers b{color:#fff}
.buybtn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));color:#12002a;font-weight:900;border:none;border-radius:26px;padding:15px;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(255,92,240,.35)}
.buybtn:disabled{opacity:.45;box-shadow:none}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;z-index:80;opacity:0;transition:opacity .2s;pointer-events:none}
.toast.on{opacity:.95}
.note{text-align:center;color:var(--dim);font-size:10.5px;margin:16px;line-height:1.5}
#installBtn{display:none;position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:70;
 font-family:var(--disp);font-size:20px;letter-spacing:1.5px;padding:12px 26px;border:2px solid var(--cyan);border-radius:40px;
 background:rgba(87,230,255,.14);color:#fff;text-shadow:0 0 8px rgba(87,230,255,.7);box-shadow:0 0 20px rgba(87,230,255,.55),inset 0 0 14px rgba(87,230,255,.25);cursor:pointer}
#iosHint{display:none;position:fixed;left:12px;right:12px;bottom:16px;z-index:70;text-align:center;font-size:12.5px;color:#eafcff;
 background:rgba(24,13,51,.94);border:1px solid var(--mag);border-radius:14px;padding:11px 14px;box-shadow:0 0 18px rgba(255,92,240,.4)}
#iosHint b{color:var(--mag)}
</style></head>
<body>
<header>
  <div class="logo"><b class="l1">SUPERFAN</b><b class="l2">SHUFFLE</b></div>
  <div class="tag">Face the Music.</div>
</header>
<div class="wrap" id="app"></div>

<button id="installBtn">📲 Install App</button>
<div id="iosHint">Install: tap <b>Share ⬆︎</b> then <b>“Add to Home Screen”</b></div>
<!-- mode picker -->
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
/* ---- dummy vault data ---- */
var VAULTS=[
 {id:'taylor', name:'Taylor Swift', vol:1, genre:'Pop', badge:'prem', shuffled:72, total:250, c:['#c9a4e6','#efe4d0'], dark:0},
 {id:'gracie', name:'Gracie Abrams', vol:1, genre:'Pop', badge:'free', trial:3, shuffled:12, total:250, c:['#aee0ff','#dff2ff'], dark:0},
 {id:'chappell', name:'Chappell Roan', vol:1, genre:'Pop', badge:'free', trial:5, shuffled:0, total:250, c:['#8b1e4b','#d33a6e'], dark:1},
 {id:'sabrina', name:'Sabrina Carpenter', vol:1, genre:'Pop', badge:'prem', shuffled:180, total:250, c:['#f6c9a8','#f0d8c0'], dark:0},
 {id:'olivia', name:'Olivia Rodrigo', vol:1, genre:'Pop', badge:'prem', shuffled:44, total:250, c:['#b7a0e0','#e0d4f2'], dark:0},
 {id:'dmb', name:'Dave Matthews Band', vol:1, genre:'Rock', badge:'prem', shuffled:151, total:250, c:['#2f3d2a','#5a6b4a'], dark:1},
 {id:'frank', name:'Frank Turner', vol:1, genre:'Rock', badge:'free', trial:2, shuffled:22, total:250, c:['#c94b2a','#e88a4a'], dark:1},
 {id:'menzingers', name:'The Menzingers', vol:1, genre:'Rock', badge:'prem', shuffled:98, total:250, c:['#1b1b22','#3a3a48'], dark:1},
 {id:'jcole', name:'J. Cole', vol:1, genre:'Hip-Hop', badge:'prem', shuffled:60, total:250, c:['#141414','#333'], dark:1},
 {id:'kendrick', name:'Kendrick Lamar', vol:1, genre:'Hip-Hop', badge:'prem', shuffled:210, total:250, c:['#2a1a12','#5a3a22'], dark:1},
 {id:'doja', name:'Doja Cat', vol:1, genre:'Hip-Hop', badge:'free', trial:4, shuffled:5, total:250, c:['#3a1c4a','#7a3aa0'], dark:1},
 {id:'tyler', name:'Tyler, the Creator', vol:1, genre:'Hip-Hop', badge:'prem', shuffled:130, total:250, c:['#d8e04a','#eef08a'], dark:0}
];
var GAMES=[
 {id:'tune', ico:'🎤', name:'Name That Tune', blurb:'Hum, describe, or belt it — no recordings, all you.'},
 {id:'lyric', ico:'✍️', name:'Fill-in-the-Lyric', blurb:'Fragmented lyric, fill the blanks. 1 of 3 to score.'},
 {id:'party', ico:'🎉', name:'Party Trivia', blurb:'Fast fan-knowledge, party pace. Multiplayer.'},
 {id:'solo', ico:'🧠', name:'Superfan Solo', blurb:'Sit-down deep quiz. How big a fan are you, really?'}
];
var PRICES={1:1.99,2:2.99,4:3.99};

function coverHTML(v,big){
 var grad='linear-gradient(135deg,'+v.c[0]+','+v.c[1]+')';
 var tc=v.dark?'#fff':'#2a1533';
 var badge=v.badge==='free'?'<div class="badge free">Free</div>':'<div class="badge prem">Premium</div>';
 var trial=(v.badge==='free'&&v.trial)?'<div class="trial">'+v.trial+' days left</div>':'';
 return '<div class="cover" style="background:'+grad+'">'+badge+trial+'<div class="vinyl"></div>'
   +'<div class="art" style="color:'+tc+'">'+v.name+'<div style="font-size:11px;opacity:.8;margin-top:4px;letter-spacing:1px">VOL. '+v.vol+'</div></div></div>';
}
function vaultCard(v){
 var pct=Math.round(v.shuffled/v.total*100);
 return '<div class="vault" onclick="pickVault(\''+v.id+'\')">'+coverHTML(v)
  +'<div class="vname">'+v.name+'</div><div class="vvol">VOL. '+v.vol+'</div>'
  +'<div class="prog"><i style="width:'+pct+'%"></i></div>'
  +'<div class="pgt">'+v.shuffled+' / '+v.total+' shuffled</div></div>';
}
function byId(id){for(var i=0;i<VAULTS.length;i++)if(VAULTS[i].id===id)return VAULTS[i];}

function pickVault(id){ if(id==='gracie'){ location.href='/play.html?vault=gracie'; } else { openVault(id); } }
function render(){
 var app=document.getElementById('app'), h='';
 var feat=byId('taylor');
 h+='<h2>Featured of the Week</h2>';
 h+='<div class="feat">'+coverHTML(feat,1)+'<div class="fmeta"><div class="k">'+feat.name+'</div>'
   +'<div class="s">Vol. '+feat.vol+' · 4 games inside</div>'
   +'<button class="cta" onclick="openVault(\'taylor\')">Open Vault</button></div></div>';
 var freeV=VAULTS.filter(function(v){return v.badge==='free'});
 h+='<h2>Free Vault to Try <span class="pill">5-question taste</span></h2><div class="row">'+freeV.map(vaultCard).join('')+'</div>';
 ['Pop','Rock','Hip-Hop'].forEach(function(g){
   h+='<h2>Top in '+g+' <span class="pill">vaults</span></h2><div class="row">'
     +VAULTS.filter(function(v){return v.genre===g}).map(vaultCard).join('')+'</div>';
 });
 h+='<div class="note">Prototype · dummy vaults & data · no accounts or payments wired yet.<br>Tap any vault to see the four games and pricing.</div>';
 app.innerHTML=h;
}

/* ---- mode picker ---- */
var sel={};
function openVault(id){
 var v=byId(id); sel={};
 var g='<div class="shead">'+coverHTML(v)+'<div class="t"><b>'+v.name+'</b><span>Vol. '+v.vol+' · pick your games</span></div>'
   +'<button class="xbtn" onclick="closeOv()">×</button></div>';
 g+='<div class="pk">4 games in this vault</div>';
 GAMES.forEach(function(m){
   g+='<div class="game" id="g_'+m.id+'" onclick="toggleGame(\''+m.id+'\')">'
     +'<div class="ico">'+m.ico+'</div><div class="gt"><b>'+m.name+'</b><span>'+m.blurb+'</span></div>'
     +'<div class="free" onclick="event.stopPropagation();tryFree(\''+m.id+'\')">Try 5 free ▸</div>'
     +'<div class="chk">✓</div></div>';
 });
 g+='<div class="buybar"><div class="tiers"><span>1 game <b>$1.99</b></span><span>2 games <b>$2.99</b></span><span>All 4 <b>$3.99</b></span></div>'
   +'<button class="buybtn" id="buybtn" disabled onclick="buy()">Select games to unlock</button></div>';
 document.getElementById('sheet').innerHTML=g;
 document.getElementById('ov').classList.add('on');
}
function closeOv(){document.getElementById('ov').classList.remove('on');}
function toggleGame(id){
 sel[id]=!sel[id];
 document.getElementById('g_'+id).classList.toggle('sel',sel[id]);
 var n=Object.keys(sel).filter(function(k){return sel[k]}).length;
 var b=document.getElementById('buybtn');
 if(n===0){b.disabled=true;b.textContent='Select games to unlock';}
 else{b.disabled=false;
  var price=(n===1)?1.99:(n===2)?2.99:3.99;
  var label=(n>=3)?'Unlock all 4 games':'Unlock '+n+' game'+(n>1?'s':'');
  var extra=(n===3)?'  (4th on us!)':'';
  b.textContent=label+' · $'+price.toFixed(2)+extra;}
}
function tryFree(id){ location.href='/play.html?mode='+id; }
function buy(){var n=Object.keys(sel).filter(function(k){return sel[k]}).length; var eff=(n>=3)?4:n; var price=(n===1)?1.99:(n===2)?2.99:3.99; toast('Checkout: '+(eff===4?'all 4 games':eff+' game'+(eff>1?'s':''))+' · $'+price.toFixed(2)+' — payments not wired yet');}
var tHandle;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tHandle);tHandle=setTimeout(function(){t.classList.remove('on');},2400);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target.id==='ov')closeOv();});

/* ---- PWA install affordance ---- */
(function(){
 var standalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
 if(standalone) return; // already installed
 var deferred=null, btn=document.getElementById('installBtn');
 window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; btn.style.display='block'; });
 btn.addEventListener('click', function(){ if(!deferred) return; btn.style.display='none'; deferred.prompt(); deferred.userChoice.then(function(){ deferred=null; }); });
 window.addEventListener('appinstalled', function(){ btn.style.display='none'; toast('Installed! Launch it from your home screen.'); });
 // iOS Safari has no beforeinstallprompt -> show manual hint
 var ua=navigator.userAgent||'';
 var isIOS=/iP(hone|ad|od)/.test(ua) && !window.MSStream;
 if(isIOS && !standalone){ var hint=document.getElementById('iosHint'); hint.style.display='block'; setTimeout(function(){hint.style.display='none';}, 9000); }
})();
function goFullscreen(){ try{ var el=document.documentElement; var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen; if(fn && !(document.fullscreenElement||document.webkitFullscreenElement)){ var p=fn.call(el); if(p&&p.catch)p.catch(function(){}); } }catch(e){} }
document.addEventListener('click', function(){ goFullscreen(); }, {once:true});
render();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body></html>

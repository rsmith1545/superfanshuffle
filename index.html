<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperFan Shuffle">
<meta name="theme-color" content="#150a2c">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>SuperFan Shuffle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cyan:#57e6ff;--mag:#ff5cf0;--chrome:#150a2c;--card:#241448;--ink:#f3eaff;--dim:#b9a8e0;--prem:#ffd24a;--accent:#b06aff;
 --disp:'Bebas Neue',sans-serif;--body:'Barlow',system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:var(--body);color:var(--ink);
 background:radial-gradient(130% 90% at 50% 2%,#3f2680 0%,#301c62 52%,#281552 100%);background-attachment:fixed;-webkit-user-select:none;user-select:none}
body{overflow-y:auto;padding:0 0 80px}
.wrap{max-width:820px;margin:0 auto;padding:0 16px}
/* dark chrome header framing the lighter content */
header{padding:16px 16px 8px;text-align:center;background:var(--chrome);box-shadow:0 6px 18px rgba(0,0,0,.35)}
.logo{display:inline-block;border:3px solid var(--mag);border-radius:22px;padding:8px 20px 11px;
 box-shadow:0 0 18px rgba(255,92,240,.55),inset 0 0 18px rgba(255,92,240,.25)}
.logo b{display:block;font-family:var(--disp);letter-spacing:1px;line-height:.82;font-size:11.5vw;max-width:100%;transform:skewX(-6deg)}
.logo .l1{color:#bfefff;text-shadow:0 0 10px var(--cyan),0 0 22px rgba(87,230,255,.7)}
.logo .l2{color:#ffc4f6;text-shadow:0 0 10px var(--mag),0 0 22px rgba(255,92,240,.7)}
.tag{margin-top:6px;font-weight:600;font-size:3.3vw;color:var(--cyan);letter-spacing:.5px;text-shadow:0 0 8px rgba(87,230,255,.5)}
@media(min-width:560px){.logo b{font-size:62px}.tag{font-size:15px}}
/* edition top-tabs */
.tabs{display:flex;gap:8px;justify-content:center;margin:12px 0 2px;flex-wrap:wrap}
.tabs button{font-family:var(--disp);font-size:18px;letter-spacing:1px;padding:5px 16px;border-radius:22px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer}
.tabs button.on{color:#12002a;background:var(--accent);border-color:transparent;box-shadow:0 0 14px -2px var(--accent)}
h2{font-family:var(--disp);font-size:23px;letter-spacing:1px;margin:20px 4px 8px;text-transform:uppercase;color:#fff}
h2 .pill{font-style:normal;font-size:11px;vertical-align:middle;margin-left:8px;padding:2px 8px;border-radius:20px;background:rgba(255,92,240,.22);color:#ffd7f6;font-family:var(--body);font-weight:700}
.row{display:flex;gap:13px;overflow-x:auto;padding:4px 4px 12px;scroll-snap-type:x mandatory}
.row::-webkit-scrollbar{display:none}
/* vault tile: square sleeve + record, NAME BELOW (legible), no counts, no countdown */
.vault{flex:0 0 auto;width:146px;scroll-snap-align:start;cursor:pointer;transition:transform .12s}
.vault:active{transform:scale(.96)}
.cover{position:relative;height:146px;border-radius:16px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.45)}
.vinyl{position:absolute;right:-40px;top:50%;transform:translateY(-50%);width:118px;height:118px;border-radius:50%;
 background:radial-gradient(circle at 50% 50%,#111 20%,#000 21%,#1a1a1a 22% 34%,#000 35% 37%,#222 38% 60%,#000 61%);box-shadow:0 0 0 2px rgba(255,255,255,.06)}
.vinyl:after{content:"";position:absolute;inset:44px;border-radius:50%;background:var(--mag);opacity:.9}
.badge{position:absolute;top:8px;left:8px;z-index:3;font-size:9px;font-weight:800;letter-spacing:.5px;padding:3px 8px;border-radius:20px;text-transform:uppercase}
.badge.free{background:var(--mag);color:#2a0020}.badge.prem{background:var(--prem);color:#3a2a00}
.vname{margin:8px 2px 0;font-weight:800;font-size:13px;line-height:1.12;color:#fff}
.seeallc{display:flex;align-items:center;justify-content:center;background:rgba(87,230,255,.06);border:2px dashed rgba(87,230,255,.45);font-family:var(--disp);font-size:19px;letter-spacing:1px;color:var(--cyan);text-shadow:0 0 8px rgba(87,230,255,.5);padding:0 12px;text-align:center}
/* featured — whole card is the tap target, no button */
.feat{display:flex;gap:14px;background:linear-gradient(120deg,rgba(176,106,255,.16),rgba(255,92,240,.10));border:1.5px solid var(--accent);border-radius:18px;padding:14px;cursor:pointer;box-shadow:0 0 26px -8px var(--accent);transition:transform .12s}
.feat:active{transform:scale(.985)}
.feat .cover{height:120px;width:120px;flex:0 0 auto}
.feat .fmeta{display:flex;flex-direction:column;justify-content:center;gap:5px}
.feat .fmeta .k{font-family:var(--disp);font-size:30px;letter-spacing:.5px;line-height:1;color:#fff}
.feat .fmeta .s{color:var(--dim);font-size:12.5px;font-weight:600}
.feat .go{margin-top:6px;color:var(--cyan);font-weight:800;font-size:12.5px;letter-spacing:.5px}
/* unlock sheet */
.ov{position:fixed;inset:0;z-index:90;background:rgba(8,4,20,.72);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,#241645,#180d33);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid rgba(255,255,255,.12);padding:16px 16px 26px;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.shead{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.shead .cover{height:70px;width:70px;flex:0 0 auto}
.shead .t b{font-weight:900;font-size:20px;display:block}
.shead .t span{color:var(--dim);font-size:12px;font-weight:700}
.xbtn{margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
.ublurb{color:var(--dim);font-size:13.5px;margin:14px 2px 16px;line-height:1.45}
.buybtn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));color:#12002a;font-weight:900;border:none;border-radius:26px;padding:15px;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(255,92,240,.35)}
.buybtn.ghost{background:rgba(87,230,255,.10);color:#fff;border:2px solid var(--cyan);box-shadow:none;margin-bottom:11px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;z-index:95;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}
.toast.on{opacity:.95}
.note{text-align:center;color:var(--dim);font-size:10.5px;margin:16px;line-height:1.5}
.emptyv{text-align:center;color:var(--dim);padding:60px 22px}
.emptyv .big{font-family:var(--disp);font-size:34px;color:#fff;letter-spacing:1px}
.emptyv p{margin-top:8px;font-size:13px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.5}
/* bottom nav (dark chrome) */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:80;display:flex;background:var(--chrome);border-top:1px solid rgba(255,255,255,.08);box-shadow:0 -6px 18px rgba(0,0,0,.4)}
.bnav button{flex:1;background:none;border:none;color:#8b849c;font-family:var(--body);font-weight:700;font-size:11.5px;letter-spacing:.5px;padding:9px 0 11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav button .ic{font-size:20px}
.bnav button.on{color:var(--cyan);text-shadow:0 0 8px rgba(87,230,255,.55)}
.bnav button.on .ic{filter:drop-shadow(0 0 7px var(--cyan))}
#installBtn{display:none;position:fixed;left:50%;bottom:76px;transform:translateX(-50%);z-index:85;
 font-family:var(--disp);font-size:20px;letter-spacing:1.5px;padding:11px 26px;border:2px solid var(--cyan);border-radius:40px;
 background:rgba(87,230,255,.14);color:#fff;text-shadow:0 0 8px rgba(87,230,255,.7);box-shadow:0 0 20px rgba(87,230,255,.55),inset 0 0 14px rgba(87,230,255,.25);cursor:pointer}
#iosHint{display:none;position:fixed;left:12px;right:12px;bottom:74px;z-index:85;text-align:center;font-size:12.5px;color:#eafcff;
 background:rgba(24,13,51,.94);border:1px solid var(--mag);border-radius:14px;padding:11px 14px;box-shadow:0 0 18px rgba(255,92,240,.4)}
#iosHint b{color:var(--mag)}
</style></head>
<body>
<header>
  <div class="logo"><b class="l1">SUPERFAN</b><b class="l2">SHUFFLE</b></div>
  <div class="tag">Face the Music.</div>
</header>
<div class="wrap" id="app"></div>

<button id="installBtn">📲 Install App</button>
<div id="iosHint">Install: tap <b>Share ⬆︎</b> then <b>“Add to Home Screen”</b></div>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<nav class="bnav">
  <button id="nav-play" class="on" onclick="setView('play')"><span class="ic">🎮</span>Play</button>
  <button id="nav-explore" onclick="setView('explore')"><span class="ic">🧭</span>Explore</button>
  <button id="nav-vaults" onclick="setView('vaults')"><span class="ic">🎴</span>My Vaults</button>
</nav>

<script>
/* ===== Editions: Music live; Film&TV + Sports hidden behind Firebase flag (editions.<id>.enabled).
   Per-edition ACCENT tint (glows only, chrome stays dark; never aqua — that's nav).
   DEV_PREVIEW renders the hidden tabs w/ generic non-IP placeholders for the build. ===== */
var DEV_PREVIEW=true;
var EDITIONS=[
 {id:'music',  label:'Music',     enabled:true,  accent:'#b06aff'},
 {id:'filmtv', label:'Film & TV', enabled:false, accent:'#ffc24a'},
 {id:'sports', label:'Sports',    enabled:false, accent:'#ff9d2e'}
];
function editionVisible(e){ return e.enabled || DEV_PREVIEW; }
function edById(id){for(var i=0;i<EDITIONS.length;i++)if(EDITIONS[i].id===id)return EDITIONS[i];}

/* every vault inherits the template default: 5 free questions, then $0.99 to unlock. No per-vault flag.
   No counts stored for display; free tiles show only "FREE" (countdown removed until a rotation calendar is real). */
var VAULTS=[
 /* --- Pop --- */
 {id:'taylor', name:'Taylor Swift', edition:'music', cat:'Pop', badge:'prem', c:['#c9a4e6','#efe4d0'], dark:0},
 {id:'gracie', name:'Gracie Abrams', edition:'music', cat:'Pop', badge:'free', c:['#aee0ff','#dff2ff'], dark:0},
 {id:'chappell', name:'Chappell Roan', edition:'music', cat:'Pop', badge:'free', c:['#8b1e4b','#d33a6e'], dark:1},
 {id:'sabrina', name:'Sabrina Carpenter', edition:'music', cat:'Pop', badge:'prem', c:['#f6c9a8','#f0d8c0'], dark:0},
 {id:'olivia', name:'Olivia Rodrigo', edition:'music', cat:'Pop', badge:'prem', c:['#b7a0e0','#e0d4f2'], dark:0},
 /* --- Hip-Hop & R&B --- */
 {id:'jcole', name:'J. Cole', edition:'music', cat:'Hip-Hop & R&B', badge:'prem', c:['#141414','#333'], dark:1},
 {id:'kendrick', name:'Kendrick Lamar', edition:'music', cat:'Hip-Hop & R&B', badge:'prem', c:['#2a1a12','#5a3a22'], dark:1},
 {id:'doja', name:'Doja Cat', edition:'music', cat:'Hip-Hop & R&B', badge:'free', c:['#3a1c4a','#7a3aa0'], dark:1},
 {id:'tyler', name:'Tyler, the Creator', edition:'music', cat:'Hip-Hop & R&B', badge:'prem', c:['#d8e04a','#eef08a'], dark:0},
 /* --- Country --- */
 {id:'zach', name:'Zach Bryan', edition:'music', cat:'Country', badge:'prem', c:['#4a3a24','#8a6a3a'], dark:1},
 {id:'wallen', name:'Morgan Wallen', edition:'music', cat:'Country', badge:'prem', c:['#2a3a24','#5a6a3a'], dark:1},
 {id:'combs', name:'Luke Combs', edition:'music', cat:'Country', badge:'free', c:['#3a2a1a','#7a5a3a'], dark:1},
 /* --- Alt & Grunge --- */
 {id:'nirvana', name:'Nirvana', edition:'music', cat:'Alt & Grunge', badge:'prem', c:['#c9d24a','#eef08a'], dark:0},
 {id:'pearljam', name:'Pearl Jam', edition:'music', cat:'Alt & Grunge', badge:'prem', c:['#7a2a2a','#a85a3a'], dark:1},
 {id:'foo', name:'Foo Fighters', edition:'music', cat:'Alt & Grunge', badge:'free', c:['#3a3a44','#6a6a78'], dark:1},
 {id:'rhcp', name:'Red Hot Chili Peppers', edition:'music', cat:'Alt & Grunge', badge:'prem', c:['#8b1e1e','#d33a2a'], dark:1},
 {id:'smashing', name:'Smashing Pumpkins', edition:'music', cat:'Alt & Grunge', badge:'prem', c:['#2a2a3a','#5a4a6a'], dark:1},
 {id:'soundgarden', name:'Soundgarden', edition:'music', cat:'Alt & Grunge', badge:'prem', c:['#3a2a1a','#7a5a2a'], dark:1},
 {id:'oasis', name:'Oasis', edition:'music', cat:'Alt & Grunge', badge:'free', c:['#1a3a5a','#3a6a9a'], dark:1},
 {id:'menzingers', name:'The Menzingers', edition:'music', cat:'Alt & Grunge', badge:'prem', c:['#1b1b22','#3a3a48'], dark:1},
 /* --- Classic Rock (9 -> See All) --- */
 {id:'queen', name:'Queen', edition:'music', cat:'Classic Rock', badge:'prem', c:['#2a1a5a','#6a4aa0'], dark:1},
 {id:'ledzep', name:'Led Zeppelin', edition:'music', cat:'Classic Rock', badge:'prem', c:['#1a1a1a','#4a4a4a'], dark:1},
 {id:'bowie', name:'David Bowie', edition:'music', cat:'Classic Rock', badge:'prem', c:['#5a2a6a','#a04ac0'], dark:1},
 {id:'stones', name:'The Rolling Stones', edition:'music', cat:'Classic Rock', badge:'prem', c:['#6a1a1a','#c0302a'], dark:1},
 {id:'thewho', name:'The Who', edition:'music', cat:'Classic Rock', badge:'prem', c:['#1a3a6a','#3a6ac0'], dark:1},
 {id:'eagles', name:'Eagles', edition:'music', cat:'Classic Rock', badge:'prem', c:['#3a2a1a','#7a5a3a'], dark:1},
 {id:'ccr', name:'Creedence Clearwater Revival', edition:'music', cat:'Classic Rock', badge:'prem', c:['#2a3a1a','#5a7a3a'], dark:1},
 {id:'gratefuldead', name:'Grateful Dead', edition:'music', cat:'Classic Rock', badge:'prem', c:['#6a2a5a','#c04aa0'], dark:1},
 {id:'bonjovi', name:'Bon Jovi', edition:'music', cat:'Classic Rock', badge:'prem', c:['#2a2a3a','#5a5a7a'], dark:1},
 /* --- Singer-Songwriter · Jam · Indie --- */
 {id:'dmb', name:'Dave Matthews Band', edition:'music', cat:'Singer-Songwriter · Jam · Indie', badge:'prem', c:['#2f3d2a','#5a6b4a'], dark:1},
 {id:'frank', name:'Frank Turner', edition:'music', cat:'Singer-Songwriter · Jam · Indie', badge:'free', c:['#c94b2a','#e88a4a'], dark:1},
 {id:'jackjohnson', name:'Jack Johnson', edition:'music', cat:'Singer-Songwriter · Jam · Indie', badge:'prem', c:['#1a4a4a','#3a8a7a'], dark:1},
 /* --- Sports edition: one LIVE free seed + generic placeholders --- */
 {id:'shuffle85', name:"The '85 Shuffle", edition:'sports', cat:'', badge:'free', c:['#0b2265','#c83803'], dark:1},
 {id:'sp_a', name:'Sample Vault A', edition:'sports', cat:'', badge:'prem', c:['#3a2a1a','#7a5a2a'], dark:1},
 {id:'sp_b', name:'Sample Vault B', edition:'sports', cat:'', badge:'prem', c:['#2a3a1a','#5a7a3a'], dark:1},
 /* --- Film & TV edition: generic placeholders only --- */
 {id:'ft_a', name:'Sample Vault A', edition:'filmtv', cat:'', badge:'prem', c:['#3a2a6e','#6a4aa0'], dark:1},
 {id:'ft_b', name:'Sample Vault B', edition:'filmtv', cat:'', badge:'free', c:['#2a3a6e','#4a6aa0'], dark:1},
 {id:'ft_c', name:'Sample Vault C', edition:'filmtv', cat:'', badge:'prem', c:['#5a2a5e','#8a4a8e'], dark:1}
];
function byId(id){for(var i=0;i<VAULTS.length;i++)if(VAULTS[i].id===id)return VAULTS[i];}
/* curated shelves */
var BEST_OF=['taylor','kendrick','nirvana','queen','dmb','olivia'];
var RECENTLY_ADDED=['chappell','soundgarden','zach','gratefuldead','jackjohnson'];
var CAT_ORDER=['Best Of','Pop','Hip-Hop & R&B','Country','Alt & Grunge','Classic Rock','Singer-Songwriter · Jam · Indie'];

/* tile art: sleeve + record + badge; NAME BELOW (not on the record) */
function coverHTML(v){
 var grad='linear-gradient(135deg,'+v.c[0]+','+v.c[1]+')';
 var badge=v.badge==='free'?'<div class="badge free">Free</div>':'<div class="badge prem">Premium</div>';
 return '<div class="cover" style="background:'+grad+'">'+badge+'<div class="vinyl"></div></div>';
}
function tileHTML(v){ return '<div class="vault" onclick="pickVault(\''+v.id+'\')">'+coverHTML(v)+'<div class="vname">'+v.name+'</div></div>'; }
function shelf(title,arr,minN){ if(arr.length < (minN||3)) return ''; var tiles=arr.map(tileHTML).join(''); if(arr.length>9){ tiles+='<div class="vault" onclick="toast(\'See all '+title.replace(/'/g,"")+' — coming soon\')"><div class="cover seeallc">See All '+title+' ▸</div></div>'; } return '<h2>'+title+'</h2><div class="row">'+tiles+'</div>'; }

/* ===== views: Play (home) · Explore · My Vaults ===== */
var curEdition='music', curView='play';
function setEdition(id){ curEdition=id; var e=edById(id); if(e) document.documentElement.style.setProperty('--accent', e.accent); render(); window.scrollTo(0,0); }
function setView(v){ curView=v; render(); window.scrollTo(0,0); }
function tabsHTML(){
 var vis=EDITIONS.filter(editionVisible); if(vis.length<=1) return '';
 var h='<div class="tabs">';
 vis.forEach(function(e){ h+='<button class="'+(e.id===curEdition?'on':'')+'" onclick="setEdition(\''+e.id+'\')">'+e.label+'</button>'; });
 return h+'</div>';
}
function playHTML(){
 var ed=curEdition, h=tabsHTML();
 var vaults=VAULTS.filter(function(v){return v.edition===ed;});
 var freeV=vaults.filter(function(v){return v.badge==='free';});
 if(freeV.length){ h+='<h2>Free This Week <span class="pill">5-question taste</span></h2><div class="row">'+freeV.map(tileHTML).join('')+'</div>'; }
 if(ed==='music'){
   var feat=byId('taylor');
   h+='<h2>Featured of the Week</h2><div class="feat" onclick="pickVault(\''+feat.id+'\')">'+coverHTML(feat)
     +'<div class="fmeta"><div class="k">'+feat.name+'</div><div class="s">How deep does your fandom go?</div><div class="go">Tap to open ▸</div></div></div>';
   h+=shelf('Recently Added', RECENTLY_ADDED.map(byId), 1);
   h+=shelf('Best Of', BEST_OF.map(byId), 3);
   CAT_ORDER.forEach(function(cat){ if(cat==='Best Of') return; h+=shelf(cat, vaults.filter(function(v){return v.cat===cat;}), 3); });
 } else {
   var placeholders=vaults.filter(function(v){return v.badge!=='free';});
   if(freeV.length===0 && placeholders.length===0){ h+='<div class="note">Coming soon.</div>'; }
   else { h+='<h2>Sample Vaults</h2><div class="row">'+placeholders.map(tileHTML).join('')+'</div>';
          h+='<div class="note">'+(ed==='sports'?'Sports':'Film &amp; TV')+' edition — dev scaffolding. Generic placeholders; real content ships later behind the Firebase flag with IP guardrails.</div>'; }
 }
 return h;
}
function exploreHTML(){ return '<div class="emptyv"><div class="big">Explore</div><p>Search every vault, and discover free brackets on Crown Your Champion. Full Explore tab coming next.</p></div>'; }
function myVaultsHTML(){ return '<div class="emptyv"><div class="big">No Vaults Yet</div><p>Unlock a vault in Play and it lands here — your collection, ready to shuffle anytime.</p></div>'; }
function render(){
 var v=curView;
 document.getElementById('app').innerHTML = v==='play'?playHTML() : v==='explore'?exploreHTML() : myVaultsHTML();
 document.getElementById('nav-play').className    = v==='play'?'on':'';
 document.getElementById('nav-explore').className = v==='explore'?'on':'';
 document.getElementById('nav-vaults').className  = v==='vaults'?'on':'';
}

/* vault tap: free → 5-question taste; paid → unlock sheet */
function pickVault(id){ var v=byId(id); if(!v) return; if(v.badge==='free'){ location.href='/play.html?vault='+id; } else { openVault(id); } }
function openVault(id){
 var v=byId(id); if(!v) return;
 var g='<div class="shead">'+coverHTML(v)+'<div class="t"><b>'+v.name+'</b><span>SuperFan Shuffle</span></div>'
   +'<button class="xbtn" onclick="closeOv()">×</button></div>';
 g+='<p class="ublurb">One shuffle, everything mixed — songs, lyrics &amp; lore flowing together. Play the first <b>5 free</b>, then unlock the rest.</p>';
 g+='<button class="buybtn ghost" onclick="tryFree(\''+v.id+'\')">▶ Play 5 free</button>';
 g+='<button class="buybtn" onclick="buy(\''+v.id+'\')">Unlock the full vault · $0.99</button>';
 document.getElementById('sheet').innerHTML=g; document.getElementById('ov').classList.add('on');
}
function closeOv(){document.getElementById('ov').classList.remove('on');}
function tryFree(id){ location.href='/play.html?vault='+id; }
function buy(id){ var v=byId(id); toast('Checkout: '+(v?v.name:'vault')+' · $0.99 — payments not wired yet'); }
var tHandle;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tHandle);tHandle=setTimeout(function(){t.classList.remove('on');},2400);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target.id==='ov')closeOv();});

/* PWA install + fullscreen */
(function(){
 var standalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
 if(standalone) return;
 var deferred=null, btn=document.getElementById('installBtn');
 window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; btn.style.display='block'; });
 btn.addEventListener('click', function(){ if(!deferred) return; btn.style.display='none'; deferred.prompt(); deferred.userChoice.then(function(){ deferred=null; }); });
 window.addEventListener('appinstalled', function(){ btn.style.display='none'; toast('Installed! Launch it from your home screen.'); });
 var ua=navigator.userAgent||''; var isIOS=/iP(hone|ad|od)/.test(ua) && !window.MSStream;
 if(isIOS && !standalone){ var hint=document.getElementById('iosHint'); hint.style.display='block'; setTimeout(function(){hint.style.display='none';}, 9000); }
})();
function goFullscreen(){ try{ var el=document.documentElement; var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen; if(fn && !(document.fullscreenElement||document.webkitFullscreenElement)){ var p=fn.call(el); if(p&&p.catch)p.catch(function(){}); } }catch(e){} }
document.addEventListener('click', function(){ goFullscreen(); }, {once:true});
render();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body></html>

<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperFan Shuffle">
<meta name="theme-color" content="#2a1257">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>SuperFan Shuffle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cyan:#57e6ff;--mag:#ff5cf0;--bg0:#160b2e;--bg1:#2a1257;--card:#20143f;--ink:#f3eaff;--dim:#b9a8e0;--free:#25d07a;--prem:#ffd24a;--disp:'Bebas Neue',sans-serif;--body:'Barlow',system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:var(--body);color:var(--ink);
 background:radial-gradient(120% 80% at 50% -10%,#3a1a6e 0%,var(--bg1) 42%,var(--bg0) 100%);background-attachment:fixed;-webkit-user-select:none;user-select:none}
body{overflow-y:auto;padding:0 0 78px}
.wrap{max-width:820px;margin:0 auto;padding:0 16px}
header{padding:18px 16px 6px;text-align:center}
.logo{display:inline-block;border:3px solid var(--mag);border-radius:22px;padding:9px 20px 12px;
 box-shadow:0 0 18px rgba(255,92,240,.55),inset 0 0 18px rgba(255,92,240,.25)}
.logo b{display:block;font-family:var(--disp);letter-spacing:1px;line-height:.82;font-size:12vw;max-width:100%;transform:skewX(-6deg)}
.logo .l1{color:#bfefff;text-shadow:0 0 10px var(--cyan),0 0 22px rgba(87,230,255,.7)}
.logo .l2{color:#ffc4f6;text-shadow:0 0 10px var(--mag),0 0 22px rgba(255,92,240,.7)}
.tag{margin-top:7px;font-weight:600;font-size:3.4vw;color:var(--cyan);letter-spacing:.5px;text-shadow:0 0 8px rgba(87,230,255,.5)}
@media(min-width:560px){.logo b{font-size:64px}.tag{font-size:16px}}
/* edition top-tabs */
.tabs{display:flex;gap:8px;justify-content:center;margin:10px 0 2px;flex-wrap:wrap}
.tabs button{font-family:var(--disp);font-size:18px;letter-spacing:1px;padding:5px 18px;border-radius:22px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer}
.tabs button.on{color:#12002a;background:linear-gradient(90deg,var(--cyan),var(--mag));border-color:transparent;box-shadow:0 0 14px rgba(255,92,240,.4)}
/* section */
h2{font-family:var(--disp);font-size:24px;letter-spacing:1px;margin:20px 4px 8px;text-transform:uppercase;color:#fff}
h2 .pill{font-style:normal;font-size:11px;vertical-align:middle;margin-left:8px;padding:2px 8px;border-radius:20px;background:rgba(255,255,255,.12);color:var(--dim);font-family:var(--body);font-weight:700}
.row{display:flex;gap:13px;overflow-x:auto;padding:4px 4px 12px;scroll-snap-type:x mandatory}
.row::-webkit-scrollbar{display:none}
/* vault tile = cover only (artist name + pill, no counts) */
.vault{flex:0 0 auto;width:150px;scroll-snap-align:start;cursor:pointer;transition:transform .12s}
.vault:active{transform:scale(.96)}
.cover{position:relative;height:150px;border-radius:16px;overflow:hidden;box-shadow:0 8px 22px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;text-align:center}
.vinyl{position:absolute;right:-42px;top:50%;transform:translateY(-50%);width:120px;height:120px;border-radius:50%;
 background:radial-gradient(circle at 50% 50%,#111 20%,#000 21%,#1a1a1a 22% 34%,#000 35% 37%,#222 38% 60%,#000 61%);box-shadow:0 0 0 2px rgba(255,255,255,.06)}
.vinyl:after{content:"";position:absolute;inset:44px;border-radius:50%;background:var(--mag);opacity:.9}
.cover .art{position:relative;z-index:2;font-weight:900;font-size:19px;line-height:1.05;padding:0 10px;text-shadow:0 2px 6px rgba(0,0,0,.5)}
.badge{position:absolute;top:8px;left:8px;z-index:3;font-size:9px;font-weight:800;letter-spacing:.5px;padding:3px 7px;border-radius:20px;text-transform:uppercase}
.badge.free{background:var(--free);color:#04240f}.badge.prem{background:var(--prem);color:#3a2a00}
.trial{position:absolute;bottom:8px;right:8px;z-index:3;font-size:9px;font-weight:700;background:rgba(0,0,0,.55);padding:3px 7px;border-radius:20px;color:#fff}
/* featured */
.feat{display:flex;gap:14px;background:linear-gradient(120deg,rgba(255,92,240,.14),rgba(87,230,255,.10));border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:14px}
.feat .cover{height:120px;width:120px;flex:0 0 auto}
.feat .fmeta{display:flex;flex-direction:column;justify-content:center;gap:5px}
.feat .fmeta .k{font-family:var(--disp);font-size:30px;letter-spacing:.5px;line-height:1}
.feat .fmeta .s{color:var(--dim);font-size:12.5px;font-weight:600}
.feat .cta{margin-top:8px;align-self:flex-start;background:linear-gradient(90deg,var(--cyan),var(--mag));color:#12002a;font-weight:900;border:none;border-radius:22px;padding:9px 18px;font-size:13px;cursor:pointer}
/* my vaults empty */
.emptyv{text-align:center;color:var(--dim);padding:64px 22px}
.emptyv .big{font-family:var(--disp);font-size:34px;color:#fff;letter-spacing:1px}
.emptyv p{margin-top:8px;font-size:13px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.5}
/* unlock sheet */
.ov{position:fixed;inset:0;z-index:90;background:rgba(8,4,20,.72);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,#241645,#180d33);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid rgba(255,255,255,.12);padding:16px 16px 26px;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.shead{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.shead .cover{height:70px;width:70px;flex:0 0 auto}
.shead .t b{font-weight:900;font-size:20px;display:block}
.shead .t span{color:var(--dim);font-size:12px;font-weight:700}
.xbtn{margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
.ublurb{color:var(--dim);font-size:13.5px;margin:14px 2px 16px;line-height:1.45}
.buybtn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));color:#12002a;font-weight:900;border:none;border-radius:26px;padding:15px;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(255,92,240,.35)}
.buybtn.ghost{background:rgba(87,230,255,.10);color:#fff;border:2px solid var(--cyan);box-shadow:none;margin-bottom:11px}
.toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;z-index:95;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}
.toast.on{opacity:.95}
.note{text-align:center;color:var(--dim);font-size:10.5px;margin:16px;line-height:1.5}
/* bottom nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:80;display:flex;background:rgba(16,8,36,.96);border-top:1px solid rgba(255,255,255,.1);backdrop-filter:blur(6px)}
.bnav button{flex:1;background:none;border:none;color:var(--dim);font-family:var(--body);font-weight:700;font-size:11.5px;letter-spacing:.5px;padding:9px 0 11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav button .ic{font-size:20px}
.bnav button.on{color:#fff}
.bnav button.on .ic{filter:drop-shadow(0 0 7px var(--cyan))}
#installBtn{display:none;position:fixed;left:50%;bottom:74px;transform:translateX(-50%);z-index:85;
 font-family:var(--disp);font-size:20px;letter-spacing:1.5px;padding:11px 26px;border:2px solid var(--cyan);border-radius:40px;
 background:rgba(87,230,255,.14);color:#fff;text-shadow:0 0 8px rgba(87,230,255,.7);box-shadow:0 0 20px rgba(87,230,255,.55),inset 0 0 14px rgba(87,230,255,.25);cursor:pointer}
#iosHint{display:none;position:fixed;left:12px;right:12px;bottom:72px;z-index:85;text-align:center;font-size:12.5px;color:#eafcff;
 background:rgba(24,13,51,.94);border:1px solid var(--mag);border-radius:14px;padding:11px 14px;box-shadow:0 0 18px rgba(255,92,240,.4)}
#iosHint b{color:var(--mag)}
</style></head>
<body>
<header>
  <div class="logo"><b class="l1">SUPERFAN</b><b class="l2">SHUFFLE</b></div>
  <div class="tag">Face the Music.</div>
</header>
<div class="wrap" id="app"></div>

<button id="installBtn">📲 Install App</button>
<div id="iosHint">Install: tap <b>Share ⬆︎</b> then <b>“Add to Home Screen”</b></div>
<div class="ov" id="ov"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<nav class="bnav">
  <button id="nav-vaults" onclick="setView('myvaults')"><span class="ic">🎴</span>My Vaults</button>
  <button id="nav-store" class="on" onclick="setView('store')"><span class="ic">🏬</span>Store</button>
</nav>

<script>
/* ===== Editions =====
   Production visibility comes from Firebase (editions.<id>.enabled). Movies + TV ship HIDDEN
   (enabled:false) — flip the Firebase flag to launch instantly, no App Store resubmission.
   DEV_PREVIEW renders the Movies/TV tabs with GENERIC non-IP placeholders so we can build/see
   the scaffolding. Set DEV_PREVIEW=false for production. Never real movie/TV titles here. */
var DEV_PREVIEW = true;
var EDITIONS = [
 {id:'music',  label:'Music',  enabled:true},
 {id:'movies', label:'Movies', enabled:false},
 {id:'tv',     label:'TV',     enabled:false}
];
function editionVisible(e){ return e.enabled || DEV_PREVIEW; }

/* ===== Vaults (dummy). NOTE: every vault inherits the template default:
   5 free questions, then $0.99 to unlock the rest. It is NOT a per-vault flag —
   any artist added to Firebase later auto-inherits it. No counts stored for display. ===== */
var VAULTS=[
 {id:'taylor', name:'Taylor Swift', edition:'music', genre:'Pop', badge:'prem', c:['#c9a4e6','#efe4d0'], dark:0},
 {id:'gracie', name:'Gracie Abrams', edition:'music', genre:'Pop', badge:'free', trial:3, c:['#aee0ff','#dff2ff'], dark:0},
 {id:'chappell', name:'Chappell Roan', edition:'music', genre:'Pop', badge:'free', trial:5, c:['#8b1e4b','#d33a6e'], dark:1},
 {id:'sabrina', name:'Sabrina Carpenter', edition:'music', genre:'Pop', badge:'prem', c:['#f6c9a8','#f0d8c0'], dark:0},
 {id:'olivia', name:'Olivia Rodrigo', edition:'music', genre:'Pop', badge:'prem', c:['#b7a0e0','#e0d4f2'], dark:0},
 {id:'dmb', name:'Dave Matthews Band', edition:'music', genre:'Rock', badge:'prem', c:['#2f3d2a','#5a6b4a'], dark:1},
 {id:'frank', name:'Frank Turner', edition:'music', genre:'Rock', badge:'free', trial:2, c:['#c94b2a','#e88a4a'], dark:1},
 {id:'menzingers', name:'The Menzingers', edition:'music', genre:'Rock', badge:'prem', c:['#1b1b22','#3a3a48'], dark:1},
 {id:'jcole', name:'J. Cole', edition:'music', genre:'Hip-Hop', badge:'prem', c:['#141414','#333'], dark:1},
 {id:'kendrick', name:'Kendrick Lamar', edition:'music', genre:'Hip-Hop', badge:'prem', c:['#2a1a12','#5a3a22'], dark:1},
 {id:'doja', name:'Doja Cat', edition:'music', genre:'Hip-Hop', badge:'free', trial:4, c:['#3a1c4a','#7a3aa0'], dark:1},
 {id:'tyler', name:'Tyler, the Creator', edition:'music', genre:'Hip-Hop', badge:'prem', c:['#d8e04a','#eef08a'], dark:0},
 /* ---- generic non-IP dev placeholders for hidden editions ---- */
 {id:'mv_a', name:'Sample Vault A', edition:'movies', badge:'prem', c:['#3a2a6e','#6a4aa0'], dark:1},
 {id:'mv_b', name:'Sample Vault B', edition:'movies', badge:'free', trial:3, c:['#2a3a6e','#4a6aa0'], dark:1},
 {id:'mv_c', name:'Sample Vault C', edition:'movies', badge:'prem', c:['#5a2a5e','#8a4a8e'], dark:1},
 {id:'tv_a', name:'Sample Vault A', edition:'tv', badge:'prem', c:['#6e2a4a','#a04a6a'], dark:1},
 {id:'tv_b', name:'Sample Vault B', edition:'tv', badge:'prem', c:['#2a6e4a','#4aa06a'], dark:1},
 {id:'tv_c', name:'Sample Vault C', edition:'tv', badge:'free', trial:2, c:['#6e5a2a','#a08a4a'], dark:1}
];
function byId(id){for(var i=0;i<VAULTS.length;i++)if(VAULTS[i].id===id)return VAULTS[i];}

/* ===== tile art (unchanged look): vinyl + gradient + name + pill + FOMO. NO counts. ===== */
function coverHTML(v){
 var grad='linear-gradient(135deg,'+v.c[0]+','+v.c[1]+')';
 var tc=v.dark?'#fff':'#2a1533';
 var badge=v.badge==='free'?'<div class="badge free">Free</div>':'<div class="badge prem">Premium</div>';
 var trial=(v.badge==='free'&&v.trial)?'<div class="trial">'+v.trial+' days left</div>':'';
 return '<div class="cover" style="background:'+grad+'">'+badge+trial+'<div class="vinyl"></div>'
   +'<div class="art" style="color:'+tc+'">'+v.name+'</div></div>';
}
function tileHTML(v){ return '<div class="vault" onclick="pickVault(\''+v.id+'\')">'+coverHTML(v)+'</div>'; }

/* ===== state + nav ===== */
var curEdition='music', curView='store';
function setEdition(id){ curEdition=id; render(); window.scrollTo(0,0); }
function setView(v){ curView=v; render(); window.scrollTo(0,0); }
function tabsHTML(){
 var vis=EDITIONS.filter(editionVisible);
 if(vis.length<=1) return '';
 var h='<div class="tabs">';
 vis.forEach(function(e){ h+='<button class="'+(e.id===curEdition?'on':'')+'" onclick="setEdition(\''+e.id+'\')">'+e.label+'</button>'; });
 return h+'</div>';
}

function storeHTML(){
 var ed=curEdition, h=tabsHTML();
 var vaults=VAULTS.filter(function(v){return v.edition===ed;});
 /* pinned Free / Seasonal strip */
 var freeV=vaults.filter(function(v){return v.badge==='free';});
 if(freeV.length){ h+='<h2>Free This Week <span class="pill">5-question taste</span></h2><div class="row">'+freeV.map(tileHTML).join('')+'</div>'; }
 /* featured — flavor line, no counts */
 var feat=vaults.filter(function(v){return v.badge!=='free';})[0]||vaults[0];
 if(feat){ h+='<h2>Featured of the Week</h2><div class="feat">'+coverHTML(feat)
   +'<div class="fmeta"><div class="k">'+feat.name+'</div><div class="s">How deep does your fandom go?</div>'
   +'<button class="cta" onclick="pickVault(\''+feat.id+'\')">Open Vault</button></div></div>'; }
 /* charts */
 if(ed==='music'){
   ['Pop','Rock','Hip-Hop'].forEach(function(g){
     var gv=vaults.filter(function(v){return v.genre===g;});
     if(gv.length) h+='<h2>Top in '+g+'</h2><div class="row">'+gv.map(tileHTML).join('')+'</div>';
   });
 } else {
   h+='<h2>Sample Vaults</h2><div class="row">'+vaults.map(tileHTML).join('')+'</div>';
   h+='<div class="note">'+(ed==='movies'?'Movies':'TV')+' edition — dev scaffolding only. Generic placeholders; real content ships later behind the Firebase flag with IP guardrails.</div>';
 }
 return h;
}
function myVaultsHTML(){
 return '<div class="emptyv"><div class="big">No Vaults Yet</div><p>Unlock a vault in the Store and it lands here — your collection, ready to shuffle anytime.</p></div>';
}
function render(){
 document.getElementById('app').innerHTML = (curView==='store') ? storeHTML() : myVaultsHTML();
 document.getElementById('nav-vaults').className = (curView==='myvaults')?'on':'';
 document.getElementById('nav-store').className  = (curView==='store')?'on':'';
}

/* ===== vault tap: free → straight into 5-question taste; paid → unlock sheet ($0.99) ===== */
function pickVault(id){ var v=byId(id); if(!v) return; if(v.badge==='free'){ location.href='/play.html?vault='+id; } else { openVault(id); } }
function openVault(id){
 var v=byId(id); if(!v) return;
 var g='<div class="shead">'+coverHTML(v)+'<div class="t"><b>'+v.name+'</b><span>SuperFan Shuffle</span></div>'
   +'<button class="xbtn" onclick="closeOv()">×</button></div>';
 g+='<p class="ublurb">One shuffle, everything mixed — songs, lyrics &amp; lore flowing together. Play the first <b>5 free</b>, then unlock the rest.</p>';
 g+='<button class="buybtn ghost" onclick="tryFree(\''+v.id+'\')">▶ Play 5 free</button>';
 g+='<button class="buybtn" onclick="buy(\''+v.id+'\')">Unlock the full vault · $0.99</button>';
 document.getElementById('sheet').innerHTML=g;
 document.getElementById('ov').classList.add('on');
}
function closeOv(){document.getElementById('ov').classList.remove('on');}
function tryFree(id){ location.href='/play.html?vault='+id; }
function buy(id){ var v=byId(id); toast('Checkout: '+(v?v.name:'vault')+' · $0.99 — payments not wired yet'); }
var tHandle;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tHandle);tHandle=setTimeout(function(){t.classList.remove('on');},2400);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target.id==='ov')closeOv();});

/* ===== PWA install + fullscreen ===== */
(function(){
 var standalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
 if(standalone) return;
 var deferred=null, btn=document.getElementById('installBtn');
 window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; btn.style.display='block'; });
 btn.addEventListener('click', function(){ if(!deferred) return; btn.style.display='none'; deferred.prompt(); deferred.userChoice.then(function(){ deferred=null; }); });
 window.addEventListener('appinstalled', function(){ btn.style.display='none'; toast('Installed! Launch it from your home screen.'); });
 var ua=navigator.userAgent||''; var isIOS=/iP(hone|ad|od)/.test(ua) && !window.MSStream;
 if(isIOS && !standalone){ var hint=document.getElementById('iosHint'); hint.style.display='block'; setTimeout(function(){hint.style.display='none';}, 9000); }
})();
function goFullscreen(){ try{ var el=document.documentElement; var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen; if(fn && !(document.fullscreenElement||document.webkitFullscreenElement)){ var p=fn.call(el); if(p&&p.catch)p.catch(function(){}); } }catch(e){} }
document.addEventListener('click', function(){ goFullscreen(); }, {once:true});
render();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
</body></html>

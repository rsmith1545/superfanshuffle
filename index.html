<!doctype html><html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SuperFan Shuffle">
<meta name="theme-color" content="#150a2c">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/apple-touch-icon-v2.png">
<title>SuperFan Shuffle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--cyan:#57e6ff;--mag:#ff5cf0;--chrome:#150a2c;--card:#241448;--ink:#f3eaff;--dim:#b9a8e0;--prem:#ffd24a;--accent:#b06aff;
 --disp:'Bebas Neue',sans-serif;--body:'Barlow',system-ui,sans-serif;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;font-family:var(--body);color:var(--ink);
 background:radial-gradient(130% 90% at 50% 2%,#3f2680 0%,#301c62 52%,#281552 100%);background-attachment:fixed;-webkit-user-select:none;user-select:none}
body{overflow-y:auto;padding:0 0 80px}
.wrap{max-width:820px;margin:0 auto;padding:0 16px}
/* dark chrome header framing the lighter content */
header{padding:16px 16px 8px;text-align:center;background:var(--chrome);box-shadow:0 6px 18px rgba(0,0,0,.35)}
/* Header height is CAPPED. It used to be dictated by the banner's aspect ratio, so on a 400px phone it ran ~215px -- a third of the viewport. Now the height is fixed and the banner is cover-cropped: the curtain loses its top/bottom, the neon sign stays whole. */
header#topbar{padding:0;overflow:hidden;position:relative;text-align:center;display:flex;align-items:center;justify-content:center;height:clamp(126px,18vh,158px);flex:0 0 auto;background:radial-gradient(120% 100% at 50% 0%,#2a1747,#1c0f38 70%,#150a2c)}
/* Full-bleed: the curtain must reach both edges. The SIGN is smaller because the banner
   artwork itself was rebuilt with the sign at 66% of the frame and the curtain extended
   outward -- you cannot shrink the sign with CSS without shrinking the curtain with it. */
.neon{position:relative;width:100%;height:100%;margin:0 auto;line-height:0}
.neon img{display:block;width:100%;height:100%;object-fit:cover;object-position:center 14%}
.neon .neon-unlit{position:absolute;inset:0;height:100%;width:100%;object-fit:cover;object-position:center 14%;opacity:0;transition:opacity .07s linear}
header#topbar:before{content:"";position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(90deg,rgba(21,10,44,.55),rgba(21,10,44,0) 12%,rgba(21,10,44,0) 88%,rgba(21,10,44,.55))}
header#topbar:after{content:"";position:absolute;left:0;right:0;bottom:0;height:18px;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(63,38,128,0),#3f2680)}
.logo{display:inline-block;border:3px solid var(--mag);border-radius:22px;padding:8px 20px 11px;
 box-shadow:0 0 18px rgba(255,92,240,.55),inset 0 0 18px rgba(255,92,240,.25)}
.logo b{display:block;font-family:var(--disp);letter-spacing:1px;line-height:.82;font-size:11.5vw;max-width:100%;transform:skewX(-6deg)}
.logo .l1{color:#bfefff;text-shadow:0 0 10px var(--cyan),0 0 22px rgba(87,230,255,.7)}
.logo .l2{color:#ffc4f6;text-shadow:0 0 10px var(--mag),0 0 22px rgba(255,92,240,.7)}
.tag{margin-top:6px;font-weight:600;font-size:3.3vw;color:var(--cyan);letter-spacing:.5px;text-shadow:0 0 8px rgba(87,230,255,.5)}
@media(min-width:560px){.logo b{font-size:62px}.tag{font-size:15px}}
/* edition top-tabs */
.tabs{display:flex;gap:8px;justify-content:center;margin:12px 0 2px;flex-wrap:wrap}
.tabs button{font-family:var(--disp);font-size:18px;letter-spacing:1px;padding:5px 16px;border-radius:22px;border:2px solid rgba(255,255,255,.15);background:rgba(255,255,255,.04);color:var(--dim);cursor:pointer}
.tabs button.on{color:#12002a;background:var(--accent);border-color:transparent;box-shadow:0 0 14px -2px var(--accent)}
h2{font-family:var(--disp);font-size:23px;letter-spacing:1px;margin:20px 4px 8px;text-transform:uppercase;color:#fff}
h2 .pill{font-style:normal;font-size:11px;vertical-align:middle;margin-left:8px;padding:2px 8px;border-radius:20px;background:rgba(255,92,240,.22);color:#ffd7f6;font-family:var(--body);font-weight:700}
.row{display:flex;gap:13px;overflow-x:auto;padding:4px 4px 12px;scroll-snap-type:x mandatory}
.row::-webkit-scrollbar{display:none}
/* vault tile — photoreal era-object on a translucent purple frosted container; artist name rendered below. */
.vault{flex:0 0 auto;width:116px;scroll-snap-align:start;cursor:pointer;transition:transform .12s}
.vault:active{transform:scale(.95)}
.cover{position:relative;width:116px;height:116px;border-radius:16px;background:linear-gradient(155deg,rgba(150,110,220,.22),rgba(85,55,150,.12));-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.08);box-shadow:5px 8px 18px rgba(0,0,0,.42),inset 0 1px 0 rgba(255,255,255,.06)}
.cover .obj{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;padding:9px;filter:drop-shadow(2px 4px 6px rgba(0,0,0,.42))}
.cover .obj.cassette{transform:rotate(-15deg) scale(1.05)}
.cover .obj.named{padding:4px}
.badge{position:absolute;top:7px;left:7px;z-index:3;font-size:8.5px;font-weight:800;letter-spacing:.5px;padding:3px 7px;border-radius:20px;text-transform:uppercase}
.badge.free{background:var(--mag);color:#2a0020}.badge.prem{background:var(--prem);color:#3a2a00}
.vname{margin-top:7px;font-family:var(--disp);font-size:16px;letter-spacing:.4px;line-height:.95;color:#f3eaff;text-align:center;text-transform:uppercase;padding:0 2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
/* ranked shelf numerals (Netflix-style) — ranked rows only */
.rrow{padding-left:36px}
.rank{position:relative;flex:0 0 auto;scroll-snap-align:start}
.rank .num{position:absolute;left:-30px;bottom:-4px;z-index:0;font-family:var(--disp);font-size:92px;line-height:.8;color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.5);text-shadow:0 2px 10px rgba(0,0,0,.55);pointer-events:none}
.rank .vault{position:relative;z-index:1}
.seeallc{display:flex;align-items:center;justify-content:center;background:rgba(87,230,255,.06);border:2px dashed rgba(87,230,255,.45);border-radius:16px;font-family:var(--disp);font-size:18px;letter-spacing:1px;color:var(--cyan);text-shadow:0 0 8px rgba(87,230,255,.5);padding:0 12px;text-align:center}
/* compact STREAM tile (approved vault-card look, tier-recolored) for the Most-Played carousel */
.scover{position:relative;width:116px;height:116px;border-radius:16px;overflow:hidden;background:radial-gradient(120% 90% at 30% 12%,rgba(var(--tint),.5),rgba(var(--tint),.14) 55%,rgba(16,10,32,.72) 100%);box-shadow:5px 8px 18px rgba(0,0,0,.42),inset 0 0 0 1.5px rgba(var(--tint),.55)}
.scover .sapp{position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:7px;z-index:2;box-shadow:0 2px 8px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.1)}
.scover .sghost{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:14px 8px 0;font-family:var(--disp);font-size:24px;line-height:.86;letter-spacing:1px;color:rgba(255,255,255,.17)}
.scover .spill{position:absolute;bottom:7px;left:9px;font-family:var(--disp);letter-spacing:2px;font-size:9px;color:var(--acc);text-shadow:0 1px 3px rgba(0,0,0,.6)}
.scover .splay{position:absolute;bottom:6px;right:7px;width:23px;height:23px;border-radius:50%;background:rgba(251,246,234,.93);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 1.5px rgba(var(--tint),.65)}
.scover .splay svg{width:11px;height:11px;color:#1a1206}
/* Browse tile at the end of the carousel */
.brtile{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(87,230,255,.06);border:2px dashed rgba(87,230,255,.45);border-radius:16px;color:var(--cyan);text-shadow:0 0 8px rgba(87,230,255,.5)}
.brtile svg{width:30px;height:30px}
.brtile span{font-family:var(--disp);font-size:16px;letter-spacing:1px;line-height:.9;text-align:center}
/* featured — whole card is the tap target, no button */
.feat{display:flex;gap:14px;background:linear-gradient(120deg,rgba(176,106,255,.16),rgba(255,92,240,.10));border:1.5px solid var(--accent);border-radius:18px;padding:14px;cursor:pointer;box-shadow:0 0 26px -8px var(--accent);transition:transform .12s}
.feat:active{transform:scale(.985)}
.feat .cover{height:120px;width:120px;flex:0 0 auto}
.feat .fmeta{display:flex;flex-direction:column;justify-content:center;gap:5px}
.feat .fmeta .k{font-family:var(--disp);font-size:30px;letter-spacing:.5px;line-height:1;color:#fff}
.feat .fmeta .s{color:var(--dim);font-size:12.5px;font-weight:600}
.feat .go{margin-top:6px;color:var(--cyan);font-weight:800;font-size:12.5px;letter-spacing:.5px}
/* vault-detail fly-in (Heads-Up float) */
.ov{position:fixed;inset:0;z-index:90;background:rgba(8,4,20,.74);backdrop-filter:blur(5px);display:none;align-items:center;justify-content:center;padding:16px}
.ov.on{display:flex}
.vcard{position:relative;width:100%;max-width:420px;background:linear-gradient(180deg,#241645,#180d33);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:16px 16px 20px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:vpop .34s cubic-bezier(.2,1.3,.35,1)}
@keyframes vpop{0%{transform:translateY(26px) scale(.62);opacity:0}60%{transform:translateY(0) scale(1.04);opacity:1}100%{transform:scale(1)}}
.vcard .xbtn{position:absolute;top:12px;right:12px}
.vtop{display:flex;align-items:center;gap:12px}
.vtop .cover{height:78px;width:78px;flex:0 0 auto}
.vtop b{font-weight:900;font-size:22px;display:block;line-height:1.05}
.vchip{display:inline-block;margin-top:5px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:3px 9px;border-radius:20px}
.vchip.free{background:var(--mag);color:#2a0020}.vchip.prem{background:var(--prem);color:#3a2a00}
.samples{display:flex;gap:8px;margin:14px 0 12px}
.scard{flex:1;border-radius:14px;padding:11px 7px;text-align:center;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09)}
.scard i{font-style:normal;font-size:21px;display:block;margin-bottom:5px}
.scard b{display:block;font-family:var(--disp);letter-spacing:1px;font-size:15px;color:#fff}
.scard span{display:block;font-size:10px;color:var(--dim);margin-top:2px;line-height:1.2}
.scard.s-song{box-shadow:inset 0 0 0 1px rgba(87,230,255,.3)}
.scard.s-lore{box-shadow:inset 0 0 0 1px rgba(255,92,240,.3)}
.scard.s-alb{box-shadow:inset 0 0 0 1px rgba(255,210,74,.32)}
.rules{font-size:12px;color:var(--dim);line-height:1.5;background:rgba(0,0,0,.2);border-radius:12px;padding:10px 12px;margin-bottom:14px}
.rules .g{color:#20e468;font-weight:800}.rules .o{color:#ff9d2e;font-weight:800}
.sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:linear-gradient(180deg,#241645,#180d33);border-top-left-radius:22px;border-top-right-radius:22px;border:1px solid rgba(255,255,255,.12);padding:16px 16px 26px;animation:up .25s ease}
@keyframes up{from{transform:translateY(30px);opacity:.6}to{transform:none;opacity:1}}
.shead{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.shead .cover{height:70px;width:70px;flex:0 0 auto}
.shead .t b{font-weight:900;font-size:20px;display:block}
.shead .t span{color:var(--dim);font-size:12px;font-weight:700}
.xbtn{margin-left:auto;background:rgba(255,255,255,.12);border:none;color:#fff;width:34px;height:34px;border-radius:50%;font-size:18px;cursor:pointer}
.ublurb{color:var(--dim);font-size:13.5px;margin:14px 2px 16px;line-height:1.45}
.buybtn{width:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));color:#12002a;font-weight:900;border:none;border-radius:26px;padding:15px;font-size:16px;cursor:pointer;box-shadow:0 6px 20px rgba(255,92,240,.35)}
.buybtn.ghost{background:rgba(87,230,255,.10);color:#fff;border:2px solid var(--cyan);box-shadow:none;margin-bottom:11px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:#000;color:#fff;padding:11px 18px;border-radius:24px;font-size:13px;font-weight:700;z-index:95;opacity:0;transition:opacity .2s;pointer-events:none;max-width:90%;text-align:center}
.toast.on{opacity:.95}
.note{text-align:center;color:var(--dim);font-size:10.5px;margin:16px;line-height:1.5}
.emptyv{text-align:center;color:var(--dim);padding:60px 22px}
.emptyv .big{font-family:var(--disp);font-size:34px;color:#fff;letter-spacing:1px}
.emptyv p{margin-top:8px;font-size:13px;max-width:340px;margin-left:auto;margin-right:auto;line-height:1.5}
/* My Vaults 50/50 split: owned on top, CYC cross-sell doorway below a divider */
.mv-top{min-height:38vh}
.mv-cross{margin-top:10px;padding-top:16px;border-top:1px solid rgba(255,255,255,.1)}
.mv-cross .xhead{font-family:var(--disp);font-size:20px;letter-spacing:1px;color:#fff;margin:2px 2px 12px;text-transform:uppercase}
/* Explore tab — search + CYC gold doorway (deliberately gold/crown, NOT SFS neon) */
.exsearch{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:11px 14px;margin:6px 2px 18px}
.exsearch input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:var(--body);font-size:15px;-webkit-user-select:text;user-select:text}
.exsearch input::placeholder{color:#9587b5}
/* Browse: sticky search + CYC-style grouped vault list */
.brsearch{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:10px;margin:6px -16px 8px;padding:12px 16px;background:rgba(42,23,79,.97);-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);border-bottom:1px solid rgba(255,255,255,.1)}
.brsearch input{flex:1;background:none;border:none;outline:none;color:#fff;font-family:var(--body);font-size:15px;-webkit-user-select:text;user-select:text}
.brsearch input::placeholder{color:#9587b5}
.brcat{font-family:var(--disp);font-size:15px;letter-spacing:1px;text-transform:uppercase;color:var(--cyan);margin:16px 2px 6px;border-bottom:1px solid rgba(87,230,255,.18);padding-bottom:4px}
.brcat span{color:var(--dim);font-size:12px;margin-left:4px}
.brow{display:flex;align-items:center;gap:12px;padding:8px 6px;border-radius:12px;cursor:pointer;transition:background .12s}
.brow:active{background:rgba(255,255,255,.06)}
.brow .cover{width:46px;height:46px;border-radius:10px;flex:0 0 auto;box-shadow:3px 4px 10px rgba(0,0,0,.4)}
.brow .cover .obj{padding:5px}
.brow .cover .badge{display:none}
.brmeta{flex:1;min-width:0}
.brmeta b{display:block;font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brmeta span{display:block;font-size:11.5px;color:var(--dim);margin-top:1px}
.brfree{color:var(--mag);font-weight:800;margin-left:6px}
.brgo{color:#6f6390;font-size:22px;font-weight:700;flex:0 0 auto;padding-right:4px}
.exlabel{color:#8a7cab;font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;margin:2px 2px 10px}
.cyc{border-radius:20px;padding:18px 16px 16px;margin-bottom:22px;position:relative;overflow:hidden;background:radial-gradient(120% 90% at 50% 0%,#1c1608,#0a0a0f 70%);border:1px solid rgba(240,165,0,.35);box-shadow:0 0 26px rgba(240,165,0,.12),inset 0 0 30px rgba(240,165,0,.06)}
.cyc-word{font-family:var(--disp);text-align:center;color:#f0a500;font-size:34px;letter-spacing:2px;line-height:.86;text-shadow:0 0 14px rgba(240,165,0,.5)}
.cyc-sub{text-align:center;color:#d8c9a0;font-size:12.5px;margin:8px 12px 14px;line-height:1.4}
.bkrow{display:flex;gap:10px;margin-bottom:14px}
.bk{flex:1;background:#111018;border:1px solid rgba(240,165,0,.22);border-radius:12px;padding:10px 8px;text-align:center;text-decoration:none;display:block}
.bk .n{color:#f5f0e6;font-size:12px;font-weight:700;line-height:1.15}
.bk .t{color:#8f8468;font-size:9.5px;font-weight:600;margin-top:3px;letter-spacing:.5px;text-transform:uppercase}
.cyc-cta{display:block;width:100%;text-align:center;background:linear-gradient(180deg,#ffc23d,#f0a500);color:#231800;font-weight:800;font-size:15px;padding:13px;border-radius:12px;box-shadow:0 4px 14px rgba(240,165,0,.35);border:none;text-decoration:none}
.cyc-note{text-align:center;color:#8f8468;font-size:10px;margin-top:8px}
.match{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px;display:flex;align-items:center;gap:13px;margin-bottom:12px;text-decoration:none}
.mdisc{width:52px;height:52px;border-radius:50%;flex:none;background:radial-gradient(circle at 50% 50%,#f0a500 0 20%,#0d0d0d 21% 24%,transparent 24%),repeating-radial-gradient(circle,#141414 0 2px,#262626 2px 4px),#0d0d0d}
.mbody{flex:1}.mbody .h{color:#fff;font-size:14px;font-weight:700}.mbody .s{color:var(--dim);font-size:11.5px;margin-top:2px}
.mgo{color:#f0a500;font-size:14px;font-weight:800;flex:none}
.crowd{border-radius:16px;padding:16px;margin-top:6px;background:linear-gradient(135deg,rgba(255,92,240,.15),rgba(87,230,255,.12));border:1px solid rgba(255,255,255,.1);text-decoration:none;display:block}
.crowd .h{color:#fff;font-weight:800;font-size:15px}.crowd .s{color:#cdbfe6;font-size:12px;margin-top:4px;line-height:1.4}
.crowd .link{color:var(--cyan);font-size:12px;font-weight:700;margin-top:10px;display:inline-block}
/* bottom nav (dark chrome) */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:80;display:flex;background:var(--chrome);border-top:1px solid rgba(255,255,255,.08);box-shadow:0 -6px 18px rgba(0,0,0,.4)}
.bnav button{flex:1;background:none;border:none;color:#8b849c;font-family:var(--body);font-weight:700;font-size:11.5px;letter-spacing:.4px;padding:6px 0 7px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav button .ic{width:22px;height:22px;display:block}
.bnav button.on{color:var(--cyan);text-shadow:0 0 8px rgba(87,230,255,.55)}
.bnav button.on .ic{filter:drop-shadow(0 0 7px var(--cyan))}
#installBtn{display:none;position:fixed;left:50%;bottom:76px;transform:translateX(-50%);z-index:85;
 font-family:var(--disp);font-size:20px;letter-spacing:1.5px;padding:11px 26px;border:2px solid var(--cyan);border-radius:40px;
 background:rgba(87,230,255,.14);color:#fff;text-shadow:0 0 8px rgba(87,230,255,.7);box-shadow:0 0 20px rgba(87,230,255,.55),inset 0 0 14px rgba(87,230,255,.25);cursor:pointer}
#iosHint{display:none;position:fixed;left:12px;right:12px;bottom:74px;z-index:85;text-align:center;font-size:12.5px;color:#eafcff;
 background:rgba(24,13,51,.94);border:1px solid var(--mag);border-radius:14px;padding:11px 14px;box-shadow:0 0 18px rgba(255,92,240,.4)}
#iosHint b{color:var(--mag)}
</style></head>
<body>
<header id="topbar">
  <div class="neon">
    <img class="neon-lit" src="sfs-neon-lit.jpg" alt="SuperFan Shuffle — Face the Music.">
    <img class="neon-unlit" id="neonUnlit" src="sfs-neon-unlit.jpg" alt="" aria-hidden="true">
  </div>
</header>
<div class="wrap" id="app"></div>

<button id="installBtn">📲 Install App</button>
<div id="iosHint">Install: tap <b>Share ⬆︎</b> then <b>“Add to Home Screen”</b></div>
<div class="ov" id="ov"><div id="sheet" style="width:100%;max-width:420px;display:flex;justify-content:center"></div></div>
<div class="toast" id="toast"></div>

<nav class="bnav">

 h+=matchRow('Pearl Jam bracket','Crown their best song — free.');
 h+=matchRow('Dave Matthews Band bracket','64 songs, one champion. Free to play.');
 h+='<a class="crowd" href="'+CYC_URL+'" target="_blank" rel="noopener"><div class="h">👑 See What the Crowd Decided</div>'
   +'<div class="s">Biggest upsets, closest finals, most controversial matchups — data from thousands of votes.</div>'
   +'<div class="link">Explore Crowd Results →</div></a>';
 return h;
}
function browseHTML(){
 var h='<h2 style="margin-top:8px">Browse</h2>';
 h+='<div class="brsearch"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#9587b5" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>'
   +'<input id="brq" type="text" placeholder="Search all vaults…" oninput="brSearch()" autocomplete="off"></div>';
 h+='<div id="brList">'+browseList('')+'</div>';
 return h;
}
function browseRow(v){
 var free=v.badge==='free'?'<span class="brfree">Free</span>':'';
 return '<div class="brow" onclick="pickVault(\''+v.id+'\')">'+coverHTML(v)
   +'<div class="brmeta"><b>'+v.name+'</b><span>'+v.cat+free+'</span></div><div class="brgo">›</div></div>';
}
function browseList(q){
 q=(q||'').trim().toLowerCase();
 var music=VAULTS.filter(function(v){return v.edition==='music';});
 var cats=CAT_ORDER.filter(function(c){return c!=='Best Of';});
 var h='', total=0;
 cats.forEach(function(cat){
   var g=music.filter(function(v){return v.cat===cat && (!q || v.name.toLowerCase().indexOf(q)>=0);});
   if(!g.length) return;
   total+=g.length;
   h+='<div class="brcat">'+cat+' <span>'+g.length+'</span></div>';
   h+=g.map(browseRow).join('');
 });
 if(!total) return '<div class="note">No vaults match that search.</div>';
 return h;
}
function brSearch(){ var el=document.getElementById('brq'); if(!el) return; var L=document.getElementById('brList'); if(L) L.innerHTML=browseList(el.value); }
/* owned vaults (payments not wired yet — seed one so the full owned round + report card is playable) */
var OWNED=['taylorswift'];
function playOwned(id){ var v=byId(id); if(v) location.href=launchURL(v)+'&mode=full'; }
function ownedTile(v){ return '<div class="vault" onclick="playOwned(\''+v.id+'\')">'+coverHTML(v)+'<div class="vname">'+v.name+'</div></div>'; }
function myVaultsHTML(){
 var owned=OWNED.map(byId).filter(Boolean);
 var top = owned.length
   ? '<h2 style="margin-top:8px">Your Vaults</h2><div class="note" style="text-align:left;margin:0 2px 10px">Owned — tap to play the full round, then see your Superfan tier.</div><div class="row" style="flex-wrap:wrap">'+owned.map(ownedTile).join('')+'</div>'
   : '<div class="emptyv"><div class="big">No Vaults Yet</div><p>Unlock a vault in Play and it lands here — your collection, ready to shuffle anytime.</p></div>';
 return '<div class="mv-top">'+top+'</div>'
   +'<div class="mv-cross"><div class="xhead">More ways to play</div>'+cycDoorwayHTML()+'</div>';
}
function render(){
 var v=curView;
 document.getElementById('app').innerHTML = v==='play'?playHTML() : v==='browse'?browseHTML() : myVaultsHTML();
 document.getElementById('nav-play').className    = v==='play'?'on':'';
 document.getElementById('nav-browse').className  = v==='browse'?'on':'';
 document.getElementById('nav-vaults').className  = v==='vaults'?'on':'';
}

/* vault tap: free → 5-question taste; paid → fly-in detail card */
function launchURL(v){ return '/play.html?vault='+encodeURIComponent(v.id)+'&n='+encodeURIComponent(v.name); }
function pickVault(id){ var v=byId(id); if(!v) return; if(v.badge==='free'){ location.href=launchURL(v); } else { openVault(id); } }
function openVault(id){
 var v=byId(id); if(!v) return;
 var chip=v.badge==='free'?'<span class="vchip free">Free</span>':'<span class="vchip prem">Premium</span>';
 var g='<div class="vcard">'
   +'<button class="xbtn" onclick="closeOv()">×</button>'
   +'<div class="vtop">'+coverHTML(v)+'<div><b>'+v.name+'</b>'+chip+'</div></div>'
   +'<p class="ublurb" style="margin:13px 2px 4px">One shuffle, everything mixed — songs, lyrics &amp; lore flowing together. Play the first <b>5 free</b>, then unlock the rest.</p>'
   +'<div class="samples">'
     +'<div class="scard s-song"><i>🎵</i><b>Song</b><span>Name the track</span></div>'
     +'<div class="scard s-lore"><i>💬</i><b>Lore</b><span>Deep-cut trivia</span></div>'
     +'<div class="scard s-alb"><i>💿</i><b>Album</b><span>Which record?</span></div>'
   +'</div>'
   +'<div class="rules">Phone on your forehead — the crowd shouts clues. Tilt <span class="g">down</span> when you get it, <span class="o">up</span> to pass. First <b>5 are free</b>.</div>'
   +'<button class="buybtn ghost" onclick="tryFree(\''+v.id+'\')">▶ Play 5 free</button>'
   +'<button class="buybtn" onclick="buy(\''+v.id+'\')">Unlock the full vault · $0.99</button>'
   +'</div>';
 document.getElementById('sheet').innerHTML=g; document.getElementById('ov').classList.add('on');
}
function closeOv(){document.getElementById('ov').classList.remove('on');}
function tryFree(id){ var v=byId(id); if(v) location.href=launchURL(v); }
function buy(id){ var v=byId(id); toast('Checkout: '+(v?v.name:'vault')+' · $0.99 — payments not wired yet'); }
var tHandle;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('on');clearTimeout(tHandle);tHandle=setTimeout(function(){t.classList.remove('on');},2400);}
document.getElementById('ov').addEventListener('click',function(e){if(e.target.id==='ov')closeOv();});

/* PWA install + fullscreen */
(function(){
 var standalone = window.matchMedia && window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone===true;
 if(standalone) return;
 var deferred=null, btn=document.getElementById('installBtn');
 window.addEventListener('beforeinstallprompt', function(e){ e.preventDefault(); deferred=e; btn.style.display='block'; });
 btn.addEventListener('click', function(){ if(!deferred) return; btn.style.display='none'; deferred.prompt(); deferred.userChoice.then(function(){ deferred=null; }); });
 window.addEventListener('appinstalled', function(){ btn.style.display='none'; toast('Installed! Launch it from your home screen.'); });
 var ua=navigator.userAgent||''; var isIOS=/iP(hone|ad|od)/.test(ua) && !window.MSStream;
 if(isIOS && !standalone){ var hint=document.getElementById('iosHint'); hint.style.display='block'; setTimeout(function(){hint.style.display='none';}, 9000); }
})();
function goFullscreen(){ try{ var el=document.documentElement; var fn=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen; if(fn && !(document.fullscreenElement||document.webkitFullscreenElement)){ var p=fn.call(el); if(p&&p.catch)p.catch(function(){}); } }catch(e){} }
document.addEventListener('click', function(){ goFullscreen(); }, {once:true});
render();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("/sw.js").catch(function(){});});}</script>
<script>
(function(){var un=document.getElementById('neonUnlit');if(!un)return;
 var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion:reduce)').matches;
 if(reduce||sessionStorage.getItem('sfsNeonOn')){un.style.opacity=0;return;}
 un.style.opacity=1; /* first paint = powered off */
 var seq=[[1,200],[0,150],[1,90],[0,70],[1,120],[0,55],[1,45]],i=0;
 function rnd(m){return m*(0.72+Math.random()*0.56);}
 function step(){if(i>=seq.length){un.style.opacity=0;try{sessionStorage.setItem('sfsNeonOn','1');}catch(e){}return;}
   var s=seq[i++];un.style.opacity=s[0];setTimeout(step,rnd(s[1]));}
 setTimeout(step,140);
})();
</script>
